<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Algemene Voorwaarden | Fleetconnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        #background-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .floating-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            height: calc(100vh - 80px);
            overflow-y: auto;
        }
        .floating-container::-webkit-scrollbar { width: 6px; }
        .floating-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .floating-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.3); border-radius: 10px; }
        
        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 24px;
            position: relative;
        }
        .language-menu {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .lang-btn {
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #1a5c8c;
        }
        .lang-btn.active {
            background: #2c7da0;
            color: white;
        }
        .lang-btn:hover:not(.active) {
            background: rgba(44,125,160,0.2);
        }
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1a2a3a;
            border-left: 4px solid #2c7da0;
            padding-left: 20px;
            margin-bottom: 24px;
            margin-top: 0;
        }
        .last-updated {
            color: #2c7da0;
            font-size: 0.8rem;
            margin-bottom: 24px;
            font-weight: 500;
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a5c8c;
            margin: 28px 0 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 6px;
        }
        p, li {
            color: #3a4a5a;
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        ul, ol { margin-left: 24px; margin-bottom: 16px; }
        a { color: #2c7da0; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        hr { margin: 24px 0; border-color: rgba(0,0,0,0.05); }
        
        .footer-links {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .footer-links a {
            margin: 0 12px;
            font-size: 0.8rem;
            color: #1a5c8c;
        }
        .footer-links a:hover { color: #2c7da0; }
        .back-home-btn {
            display: inline-block;
            background: #2c7da0;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .back-home-btn:hover {
            background: #1a5c8c;
            text-decoration: none;
        }
        @media (max-width: 700px) {
            .content-card { padding: 24px 20px; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.1rem; }
            .floating-container { margin: 20px auto; height: calc(100vh - 40px); padding: 0 16px; }
            .footer-links a { display: inline-block; margin: 6px 8px; }
            .language-menu { top: 10px; right: 15px; gap: 6px; }
            .lang-btn { font-size: 0.7rem; padding: 2px 6px; }
        }
    </style>
</head>
<body>
    <div id="background-map"></div>
    <div class="floating-container">
        <div class="content-card">
            <div class="language-menu">
                <button class="lang-btn" data-lang="nl">NL</button>
                <button class="lang-btn" data-lang="fr">FR</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <h1 id="terms-title" data-i18n="footer_voorwaarden"></h1>
            <div class="last-updated" id="last-updated"></div>
            
            <h2 id="art1"></h2>
            <ul id="art1-list">
            </ul>
            
            <h2 id="art2"></h2>
            <p id="art2-p"></p>
            
            <h2 id="art3"></h2>
            <p id="art3-p"></p>
            
            <h2 id="art4"></h2>
            <p id="art4-p"></p>
            
            <h2 id="art5"></h2>
            <p id="art5-p"></p>
            
            <h2 id="art6"></h2>
            <p id="art6-p"></p>
            
            <h2 id="art7"></h2>
            <p id="art7-p"></p>
            
            <h2 id="art8"></h2>
            <p id="art8-p"></p>
            
            <h2 id="art9"></h2>
            <p id="art9-p"></p>
            
            <hr>
            <p id="copyright" style="text-align:center; font-size:0.8rem;" data-i18n="footer_copyright"></p>
        </div>
        
        <div class="footer-links" id="footer-links">
            <a href="PV.html">🏠 <span data-i18n="nav_home">Home</span></a> |
            <a href="PVfaq.html">❓ <span data-i18n="tab_home">FAQ</span></a> |
            <a href="PVprivacy.html">🔒 <span data-i18n="footer_privacy">Privacy</span></a> |
            <a href="PVcookiebeleid.html">🍪 <span data-i18n="footer_cookie">Cookiebeleid</span></a> |
            <a href="PValgemene-voorwaarden.html">📜 <span data-i18n="footer_voorwaarden">Algemene voorwaarden</span></a>
        </div>
    </div>
    
    <script src="translations.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('background-map').setView([50.85, 4.35], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        function updateTermsContent(lang) {
            if (window.i18n && lang) {
                i18n.setLanguage(lang);
            }
            const currentLang = document.documentElement.lang || 'nl';

            document.getElementById('last-updated').innerText = i18n.t('terms_last_updated');
            document.getElementById('art1').innerText = i18n.t('terms_art1');

            let art1Html = "";
            for(let i=1; i<=4; i++) art1Html += `<li>${i18n.t('terms_art1_'+i)}</li>`;
            document.getElementById('art1-list').innerHTML = art1Html;

            document.getElementById('art2').innerText = i18n.t('terms_art2');
            document.getElementById('art2-p').innerHTML = i18n.t('terms_art2_p');
            document.getElementById('art3').innerText = i18n.t('terms_art3');
            document.getElementById('art3-p').innerHTML = i18n.t('terms_art3_p');
            document.getElementById('art4').innerText = i18n.t('terms_art4');
            document.getElementById('art4-p').innerHTML = i18n.t('terms_art4_p');
            document.getElementById('art5').innerText = i18n.t('terms_art5');
            document.getElementById('art5-p').innerHTML = i18n.t('terms_art5_p');
            document.getElementById('art6').innerText = i18n.t('terms_art6');
            document.getElementById('art6-p').innerHTML = i18n.t('terms_art6_p');
            document.getElementById('art7').innerText = i18n.t('terms_art7');
            document.getElementById('art7-p').innerHTML = i18n.t('terms_art7_p');
            document.getElementById('art8').innerText = i18n.t('terms_art8');
            document.getElementById('art8-p').innerHTML = i18n.t('terms_art8_p');
            document.getElementById('art9').innerText = i18n.t('terms_art9');
            document.getElementById('art9-p').innerHTML = i18n.t('terms_art9_p');

            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateTermsContent(btn.getAttribute('data-lang')));
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateTermsContent();
        });
    </script>
</body>
</html>
