<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetConnect | Inloggen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --accent-gold: #c9a03d;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        /* Background map effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(1.05);
            opacity: 0.9;
            z-index: -1;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            max-width: 420px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 700;
        }
        .login-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .field {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
            background: rgba(255,255,255,0.9);
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44,110,158,0.1);
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .info-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }
        .info-text {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        .info-text i {
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fas fa-car" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 16px;"></i>
        <h1>FleetConnect</h1>
        <p>Professioneel taxivervoer in België</p>

        <div id="errorBox" class="error-msg"></div>
        <div id="infoBox" class="info-msg"></div>

        <div class="field">
            <label><i class="fas fa-envelope"></i> E-mailadres</label>
            <input type="email" id="emailInput" placeholder="uw@email.be">
        </div>
        <div class="field">
            <label><i class="fas fa-lock"></i> Wachtwoord</label>
            <input type="password" id="passInput" placeholder="wachtwoord">
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Inloggen
        </button>

        <div class="info-text">
            <i class="fas fa-info-circle"></i> Log in met uw FleetConnect klantaccount.
            <br><br><a id="registerLink" href="register.html" style="color: var(--primary); font-weight: 700;">Account aanmaken</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('emailInput');
        const passInput = document.getElementById('passInput');
        const errorBox = document.getElementById('errorBox');
        const infoBox = document.getElementById('infoBox');
        const loginParams = new URLSearchParams(window.location.search);
        const requestedBookingId = loginParams.get('booking') || loginParams.get('booking_id') || loginParams.get('id') || '';
        const requestedEmail = loginParams.get('email') || '';
        const loginReason = loginParams.get('reason') || '';

        if (requestedEmail) emailInput.value = requestedEmail;
        const registerLink = document.getElementById('registerLink');
        if (registerLink) {
            const registerParams = new URLSearchParams();
            if (requestedBookingId) registerParams.set('booking', requestedBookingId);
            if (requestedEmail) registerParams.set('email', requestedEmail);
            registerLink.href = registerParams.toString() ? `/PV/register.html?${registerParams.toString()}` : '/PV/register.html';
        }

        if (loginReason === 'registered') showInfo('Account successfully created. Please verify your email address. After verification you can log in to the customer portal.', true);
        if (loginReason === 'verified') showInfo('Email successfully verified. You can now log in if your account has been approved.', true);
        if (loginReason === 'pending') showError('Your account is awaiting approval.', true);
        if (loginReason === 'profile') showError('Uw klantprofiel is nog niet gekoppeld. Log opnieuw in na verificatie of contacteer support.', true);
        if (loginReason === 'session') showError('Log in om het klantportaal te openen.', true);

        const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
        const queryType = loginParams.get('type') || hashParams.get('type');
        if (queryType === 'signup' || hashParams.get('access_token')) {
            showInfo('Email successfully verified. You can now log in if your account has been approved.', true);
        }

        function portalUrl() {
            return requestedBookingId
                ? `/PV/klantenportaalpv.html?id=${encodeURIComponent(requestedBookingId)}`
                : '/PV/klantenportaalpv.html';
        }

        function showError(msg, persist = false) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
            infoBox.style.display = 'none';
            if (!persist) {
                setTimeout(() => {
                    errorBox.style.display = 'none';
                }, 4000);
            }
        }

        function showInfo(msg, persist = false) {
            infoBox.innerText = msg;
            infoBox.style.display = 'block';
            errorBox.style.display = 'none';
            if (!persist) {
                setTimeout(() => {
                    infoBox.style.display = 'none';
                }, 5000);
            }
        }

        async function getRequestStatus(email) {
            if (!email) return null;
            try {
                const { data } = await supabase.rpc('get_account_request_status', { p_email: email });
                return data || null;
            } catch (statusError) {
                console.warn('Account request status unavailable:', statusError.message);
                return null;
            }
        }

        async function canOpenPortal(user) {
            if (!user?.email) return { allowed: false, message: 'Geen geldige sessie gevonden.' };

            try {
                const { data: access, error: accessError } = await supabase.rpc('get_customer_portal_access');
                if (!accessError && access) {
                    if (access.allowed) return { allowed: true };
                    if (access.state === 'pending') return { allowed: false, message: 'Your account is awaiting approval.' };
                    if (access.state === 'rejected') return { allowed: false, message: 'Uw accountaanvraag werd niet goedgekeurd. Neem contact op met support@fleetconnect.be.' };
                    if (access.message) return { allowed: false, message: access.message };
                }
            } catch (accessRpcError) {
                console.warn('Customer portal access RPC unavailable:', accessRpcError.message);
            }

            const status = await getRequestStatus(user.email);
            if (status?.found && status.status === 'pending' && status.request_scope !== 'customer') {
                return { allowed: false, message: 'Your account is awaiting approval.' };
            }
            if (status?.found && status.status === 'rejected' && status.request_scope !== 'customer') {
                return { allowed: false, message: 'Uw accountaanvraag werd niet goedgekeurd. Neem contact op met support@fleetconnect.be.' };
            }

            try {
                await supabase.rpc('link_customer_after_registration');
            } catch (linkError) {
                console.warn('Customer linkage unavailable:', linkError.message);
            }

            const { data: customers, error } = await supabase
                .from('customers')
                .select('id,user_id,email')
                .or(`user_id.eq.${user.id},email.eq.${user.email}`)
                .limit(1);

            if (error) {
                console.warn('Customer profile check failed:', error.message);
                return { allowed: false, message: 'Klantprofiel kon niet worden gecontroleerd. Probeer opnieuw of contacteer support.' };
            }

            if (customers?.length) return { allowed: true };

            if (status?.found && status.status === 'approved' && status.request_scope !== 'customer') {
                return { allowed: false, message: 'Uw account is goedgekeurd, maar uw klantprofiel is nog niet gekoppeld. Controleer uw verificatiemail of contacteer support.' };
            }

            return { allowed: false, message: 'Geen gekoppeld klantprofiel gevonden. Maak eerst een account aan of wacht op goedkeuring.' };
        }

        const authCode = loginParams.get('code');
        if (authCode) {
            try {
                const { error: codeError } = await supabase.auth.exchangeCodeForSession(window.location.href);
                if (codeError) {
                    showError('Verificatie kon niet worden afgerond: ' + codeError.message, true);
                } else {
                    showInfo('Uw e-mailadres is bevestigd. We controleren nu uw klanttoegang.', true);
                    window.history.replaceState({}, document.title, `/PV/index.html${requestedBookingId ? `?booking=${encodeURIComponent(requestedBookingId)}` : ''}`);
                }
            } catch (codeExchangeError) {
                showError('Verificatie kon niet worden afgerond. Probeer opnieuw of contacteer support@fleetconnect.be.', true);
                console.warn('Supabase verification exchange failed:', codeExchangeError.message);
            }
        }

        const { data: existingSession } = await supabase.auth.getSession();
        if (existingSession?.session?.user) {
            const access = await canOpenPortal(existingSession.session.user);
            if (access.allowed) window.location.replace(portalUrl());
            else showError(access.message, true);
        }

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();

            if (!email || !password) {
                showError('Vul zowel e-mailadres als wachtwoord in.');
                return;
            }

            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inloggen...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                if (!data.session) throw new Error('Login kon niet worden bevestigd.');

                const access = await canOpenPortal(data.session.user);
                if (!access.allowed) {
                    await supabase.auth.signOut();
                    showError(access.message, true);
                    return;
                }

                window.location.href = portalUrl();
            } catch (err) {
                let message = err.message || 'Ongeldige inloggegevens. Probeer opnieuw.';
                const requestStatus = await getRequestStatus(email);
                if (requestStatus?.found && requestStatus.status === 'pending') {
                    message = 'Uw accountaanvraag wacht nog op goedkeuring door FleetConnect.';
                } else if (requestStatus?.found && requestStatus.status === 'approved') {
                    message = 'Uw account is goedgekeurd. Controleer uw verificatiemail of maak uw wachtwoord opnieuw aan via de officiële Supabase verificatielink.';
                } else if (requestStatus?.found && requestStatus.status === 'rejected') {
                    message = 'Uw accountaanvraag werd niet goedgekeurd. Neem contact op met support@fleetconnect.be.';
                } else if (String(message).toLowerCase().includes('email not confirmed')) {
                    message = 'Uw e-mailadres is nog niet bevestigd. Controleer uw verificatiemail.';
                }
                showError(message, true);
                passInput.value = '';
                passInput.focus();
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        }

        // Event listeners
        loginBtn.addEventListener('click', handleLogin);
        
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        console.log("FleetConnect klantlogin gereed");
    </script>
</body>
</html>
