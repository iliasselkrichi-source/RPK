<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetConnect | Inloggen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --accent-gold: #c9a03d;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        /* Background map effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(1.05);
            opacity: 0.9;
            z-index: -1;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            max-width: 420px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 700;
        }
        .login-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .field {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
            background: rgba(255,255,255,0.9);
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44,110,158,0.1);
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .info-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }
        .info-text {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        .info-text i {
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="language-switch" aria-label="Language">
            <button type="button" data-lang="en">EN</button>
            <button type="button" data-lang="fr">FR</button>
            <button type="button" data-lang="nl">NL</button>
            <button type="button" data-lang="es">ES</button>
            <button type="button" data-lang="ar">AR</button>
        </div>
        <i class="fas fa-car" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 16px;"></i>
        <h1>FleetConnect</h1>
        <p id="subtitleText">Professional taxi transport in Belgium</p>

        <div id="errorBox" class="error-msg"></div>
        <div id="infoBox" class="info-msg"></div>

        <div class="field">
            <label><i class="fas fa-envelope"></i> E-mailadres</label>
            <input type="email" id="emailInput" placeholder="uw@email.be">
        </div>
        <div class="field">
            <label><i class="fas fa-lock"></i> Wachtwoord</label>
            <input type="password" id="passInput" placeholder="wachtwoord">
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> <span id="loginBtnText">Sign in</span>
        </button>

        <div class="info-text">
            <i class="fas fa-info-circle"></i> Log in met uw FleetConnect klantaccount.
            <br><br><a id="registerLink" href="register.html" style="color: var(--primary); font-weight: 700;">Account aanmaken</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('emailInput');
        const passInput = document.getElementById('passInput');
        const errorBox = document.getElementById('errorBox');
        const infoBox = document.getElementById('infoBox');
        const loginParams = new URLSearchParams(window.location.search);
        const requestedBookingId = loginParams.get('booking') || loginParams.get('booking_id') || loginParams.get('id') || '';
        const requestedEmail = loginParams.get('email') || '';
        const loginReason = loginParams.get('reason') || '';
        const LANGUAGE_ORDER = ['en', 'fr', 'nl', 'es', 'ar'];
        const UI = {
            en: { subtitle: 'Professional taxi transport in Belgium', email: 'Email address', emailPlaceholder: 'you@email.com', password: 'Password', passwordPlaceholder: 'password', login: 'Sign in', helper: 'Sign in with your FleetConnect customer account.', register: 'Create account', registered: 'Account successfully created. We sent you a verification email. Please confirm your email address, then sign in to the customer portal.', verified: 'Email successfully verified. You can now sign in.', pending: 'Your account is awaiting approval.', profile: 'Your customer profile is not linked yet. Sign in again after verification or contact support.', session: 'Sign in to open the customer portal.', checking: 'Your email is confirmed. We are checking your customer access.', verifyFailed: 'Verification could not be completed. Try again or contact support@fleetconnect.be.', fillCredentials: 'Enter both email address and password.', noSession: 'No valid session found.', loginBusy: 'Signing in...', invalid: 'Invalid login details. Try again.', notConfirmed: 'Your email address is not confirmed yet. Check your verification email.', resend: 'Resend verification email', resendSent: 'Verification email sent again. Please check your inbox and spam folder.', resendFailed: 'Verification email could not be resent.' },
            fr: { subtitle: 'Transport taxi professionnel en Belgique', email: 'Adresse e-mail', emailPlaceholder: 'vous@email.com', password: 'Mot de passe', passwordPlaceholder: 'mot de passe', login: 'Connexion', helper: 'Connectez-vous avec votre compte client FleetConnect.', register: 'Créer un compte', registered: 'Compte créé avec succès. Nous vous avons envoyé un e-mail de vérification. Confirmez votre adresse e-mail, puis connectez-vous au portail client.', verified: 'Adresse e-mail vérifiée. Vous pouvez maintenant vous connecter.', pending: 'Votre compte est en attente de validation.', profile: 'Votre profil client n’est pas encore lié. Reconnectez-vous après vérification ou contactez le support.', session: 'Connectez-vous pour ouvrir le portail client.', checking: 'Votre e-mail est confirmé. Nous vérifions votre accès client.', verifyFailed: 'La vérification n’a pas pu être terminée. Réessayez ou contactez support@fleetconnect.be.', fillCredentials: 'Saisissez l’adresse e-mail et le mot de passe.', noSession: 'Aucune session valide trouvée.', loginBusy: 'Connexion...', invalid: 'Identifiants invalides. Réessayez.', notConfirmed: 'Votre adresse e-mail n’est pas encore confirmée. Vérifiez votre e-mail de confirmation.', resend: 'Renvoyer l’e-mail de vérification', resendSent: 'E-mail de vérification renvoyé. Vérifiez votre boîte de réception et vos spams.', resendFailed: 'L’e-mail de vérification n’a pas pu être renvoyé.' },
            nl: { subtitle: 'Professioneel taxivervoer in België', email: 'E-mailadres', emailPlaceholder: 'uw@email.be', password: 'Wachtwoord', passwordPlaceholder: 'wachtwoord', login: 'Inloggen', helper: 'Log in met uw FleetConnect klantaccount.', register: 'Account aanmaken', registered: 'Account succesvol aangemaakt. We hebben u een verificatiemail gestuurd. Bevestig uw e-mailadres en log daarna in op het klantportaal.', verified: 'E-mailadres succesvol bevestigd. U kunt nu inloggen.', pending: 'Uw account wacht nog op goedkeuring.', profile: 'Uw klantprofiel is nog niet gekoppeld. Log opnieuw in na verificatie of contacteer support.', session: 'Log in om het klantportaal te openen.', checking: 'Uw e-mailadres is bevestigd. We controleren nu uw klanttoegang.', verifyFailed: 'Verificatie kon niet worden afgerond. Probeer opnieuw of contacteer support@fleetconnect.be.', fillCredentials: 'Vul zowel e-mailadres als wachtwoord in.', noSession: 'Geen geldige sessie gevonden.', loginBusy: 'Inloggen...', invalid: 'Ongeldige inloggegevens. Probeer opnieuw.', notConfirmed: 'Uw e-mailadres is nog niet bevestigd. Controleer uw verificatiemail.', resend: 'Verificatiemail opnieuw versturen', resendSent: 'Verificatiemail opnieuw verstuurd. Controleer uw inbox en spamfolder.', resendFailed: 'Verificatiemail kon niet opnieuw worden verstuurd.' },
            es: { subtitle: 'Transporte profesional de taxi en Bélgica', email: 'Correo electrónico', emailPlaceholder: 'usted@email.com', password: 'Contraseña', passwordPlaceholder: 'contraseña', login: 'Iniciar sesión', helper: 'Inicie sesión con su cuenta de cliente FleetConnect.', register: 'Crear cuenta', registered: 'Cuenta creada correctamente. Le enviamos un correo de verificación. Confirme su correo y luego inicie sesión.', verified: 'Correo verificado correctamente. Ahora puede iniciar sesión.', pending: 'Su cuenta está pendiente de validación.', profile: 'Su perfil de cliente aún no está vinculado. Inicie sesión de nuevo después de verificar o contacte soporte.', session: 'Inicie sesión para abrir el portal cliente.', checking: 'Su correo está confirmado. Estamos comprobando su acceso.', verifyFailed: 'No se pudo completar la verificación. Inténtelo de nuevo o contacte support@fleetconnect.be.', fillCredentials: 'Introduzca correo electrónico y contraseña.', noSession: 'No se encontró una sesión válida.', loginBusy: 'Iniciando sesión...', invalid: 'Datos de acceso inválidos. Inténtelo de nuevo.', notConfirmed: 'Su correo aún no está confirmado. Revise el correo de verificación.', resend: 'Reenviar correo de verificación', resendSent: 'Correo de verificación reenviado. Revise su bandeja y spam.', resendFailed: 'No se pudo reenviar el correo de verificación.' },
            ar: { subtitle: 'خدمة تاكسي احترافية في بلجيكا', email: 'البريد الإلكتروني', emailPlaceholder: 'you@email.com', password: 'كلمة المرور', passwordPlaceholder: 'كلمة المرور', login: 'تسجيل الدخول', helper: 'سجّل الدخول بحساب عميل FleetConnect.', register: 'إنشاء حساب', registered: 'تم إنشاء الحساب بنجاح. أرسلنا لك رسالة تحقق. يرجى تأكيد بريدك الإلكتروني ثم تسجيل الدخول.', verified: 'تم تأكيد البريد الإلكتروني. يمكنك تسجيل الدخول الآن.', pending: 'حسابك بانتظار الموافقة.', profile: 'لم يتم ربط ملف العميل بعد. سجّل الدخول مرة أخرى بعد التحقق أو تواصل مع الدعم.', session: 'سجّل الدخول لفتح بوابة العملاء.', checking: 'تم تأكيد بريدك الإلكتروني. نتحقق الآن من صلاحية الوصول.', verifyFailed: 'تعذر إكمال التحقق. حاول مرة أخرى أو تواصل مع support@fleetconnect.be.', fillCredentials: 'أدخل البريد الإلكتروني وكلمة المرور.', noSession: 'لم يتم العثور على جلسة صالحة.', loginBusy: 'جار تسجيل الدخول...', invalid: 'بيانات الدخول غير صحيحة. حاول مرة أخرى.', notConfirmed: 'لم يتم تأكيد بريدك الإلكتروني بعد. تحقق من رسالة التأكيد.', resend: 'إعادة إرسال رسالة التحقق', resendSent: 'تمت إعادة إرسال رسالة التحقق. تحقق من البريد الوارد والرسائل غير المرغوب فيها.', resendFailed: 'تعذر إعادة إرسال رسالة التحقق.' }
        };
        function detectLanguage() {
            const param = loginParams.get('lang');
            const stored = localStorage.getItem('fleetconnect_language') || localStorage.getItem('fc_partner_lang');
            const browser = (navigator.language || '').slice(0, 2).toLowerCase();
            return LANGUAGE_ORDER.includes(param) ? param : (LANGUAGE_ORDER.includes(stored) ? stored : (LANGUAGE_ORDER.includes(browser) ? browser : 'en'));
        }
        let currentLang = detectLanguage();
        const tr = () => UI[currentLang] || UI.en;


        if (requestedEmail) emailInput.value = requestedEmail;
        const registerLink = document.getElementById('registerLink');
        if (registerLink) {
            const registerParams = new URLSearchParams();
            if (requestedBookingId) registerParams.set('booking', requestedBookingId);
            if (requestedEmail) registerParams.set('email', requestedEmail);
            registerLink.href = registerParams.toString() ? `/PV/register.html?${registerParams.toString()}` : '/PV/register.html';
        }

        function applyLanguage() {
            localStorage.setItem('fleetconnect_language', currentLang);
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('subtitleText').textContent = tr().subtitle;
            document.getElementById('emailLabel').innerHTML = `<i class="fas fa-envelope"></i> ${tr().email}`;
            document.getElementById('passwordLabel').innerHTML = `<i class="fas fa-lock"></i> ${tr().password}`;
            emailInput.placeholder = tr().emailPlaceholder;
            passInput.placeholder = tr().passwordPlaceholder;
            document.getElementById('loginBtnText').textContent = tr().login;
            document.getElementById('helperText').textContent = tr().helper;
            registerLink.textContent = tr().register;
            document.querySelectorAll('[data-lang]').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
        }
        document.querySelectorAll('[data-lang]').forEach(btn => btn.addEventListener('click', () => {
            currentLang = btn.dataset.lang;
            const params = new URLSearchParams(window.location.search);
            params.set('lang', currentLang);
            window.history.replaceState({}, document.title, `${window.location.pathname}?${params.toString()}`);
            applyLanguage();
        }));
        applyLanguage();

        if (loginReason === 'registered') showInfo(tr().registered, true, true);
        if (loginReason === 'verified') showInfo(tr().verified, true);
        if (loginReason === 'pending') showError(tr().pending, true);
        if (loginReason === 'profile') showError(tr().profile, true);
        if (loginReason === 'session') showError(tr().session, true);

        const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
        const queryType = loginParams.get('type') || hashParams.get('type');
        if (queryType === 'signup' || hashParams.get('access_token')) {
            showInfo(tr().verified, true);
        }

        function portalUrl() {
            return requestedBookingId
                ? `/PV/klantenportaalpv.html?id=${encodeURIComponent(requestedBookingId)}`
                : '/PV/klantenportaalpv.html';
        }

        function showError(msg, persist = false) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
            infoBox.style.display = 'none';
            if (!persist) {
                setTimeout(() => {
                    errorBox.style.display = 'none';
                }, 4000);
            }
        }

        function showInfo(msg, persist = false, allowResend = false) {
            infoBox.innerText = msg;
            if (allowResend && emailInput.value.trim()) {
                const resend = document.createElement('button');
                resend.type = 'button';
                resend.className = 'inline-action';
                resend.textContent = tr().resend;
                resend.onclick = resendVerificationEmail;
                infoBox.appendChild(document.createElement('br'));
                infoBox.appendChild(resend);
            }
            infoBox.style.display = 'block';
            errorBox.style.display = 'none';
            if (!persist) {
                setTimeout(() => {
                    infoBox.style.display = 'none';
                }, 5000);
            }
        }

        async function resendVerificationEmail() {
            const email = emailInput.value.trim();
            if (!email) { showError(tr().fillCredentials, true); return; }
            const params = new URLSearchParams();
            if (requestedBookingId) params.set('booking', requestedBookingId);
            params.set('email', email);
            params.set('lang', currentLang);
            const redirectTo = window.location.origin + '/PV/verificatiepv.html?' + params.toString();
            const { error } = await supabase.auth.resend({ type: 'signup', email, options: { emailRedirectTo: redirectTo } });
            if (error) showError(tr().resendFailed + ' ' + error.message, true);
            else showInfo(tr().resendSent, true);
        }

        async function getRequestStatus(email) {
            if (!email) return null;
            try {
                const { data } = await supabase.rpc('get_account_request_status', { p_email: email });
                return data || null;
            } catch (statusError) {
                console.warn('Account request status unavailable:', statusError.message);
                return null;
            }
        }

        async function canOpenPortal(user) {
            if (!user?.email) return { allowed: false, message: tr().noSession };

            try {
                const { data: access, error: accessError } = await supabase.rpc('get_customer_portal_access');
                if (!accessError && access) {
                    if (access.allowed) return { allowed: true };
                    if (access.state === 'pending') return { allowed: false, message: tr().pending };
                    if (access.state === 'rejected') return { allowed: false, message: 'Uw accountaanvraag werd niet goedgekeurd. Neem contact op met support@fleetconnect.be.' };
                    if (access.message) return { allowed: false, message: access.message };
                }
            } catch (accessRpcError) {
                console.warn('Customer portal access RPC unavailable:', accessRpcError.message);
            }

            const status = await getRequestStatus(user.email);
            if (status?.found && status.status === 'pending' && status.request_scope !== 'customer') {
                return { allowed: false, message: tr().pending };
            }
            if (status?.found && status.status === 'rejected' && status.request_scope !== 'customer') {
                return { allowed: false, message: 'Uw accountaanvraag werd niet goedgekeurd. Neem contact op met support@fleetconnect.be.' };
            }

            try {
                await supabase.rpc('link_customer_after_registration');
            } catch (linkError) {
                console.warn('Customer linkage unavailable:', linkError.message);
            }

            // FIX RC-4 (also): defense-in-depth — if no linked customer, try the new
            // create_customer_registration_profile RPC (added in supabase migration
            // 20260613010000). If applied to live, this creates the missing customer row
            // and the customer can open the portal. If not applied, the catch is silent
            // and the user sees the diagnostic message.
            let customers = null;
            let profileCheckError = null;
            try {
                const result = await supabase
                    .from('customers')
                    .select('id,user_id,email')
                    .or(`user_id.eq.${user.id},email.eq.${user.email}`)
                    .limit(1);
                customers = result.data;
                profileCheckError = result.error;
            } catch (queryErr) {
                profileCheckError = queryErr;
            }

            if (profileCheckError) {
                console.warn('Customer profile check failed:', profileCheckError.message);
                return { allowed: false, message: 'Klantprofiel kon niet worden gecontroleerd. Probeer opnieuw of contacteer support.' };
            }

            if (customers?.length) return { allowed: true };

            // No customer row — try to create it via the migration's RPC.
            // FIX Blocker A (2026-06-16): the function takes a single `payload` jsonb
            // parameter, not 4 named parameters. The previous call signature
            // (p_full_name, p_email, p_phone, p_default_pickup_address) returned
            // PGRST202 404 and the customer row was never created — leaving the user
            // stuck on the login page in an infinite re-auth loop.
            try {
                const fullName = user.user_metadata?.full_name || user.email.split('@')[0];
                const phone = user.user_metadata?.phone || '';
                const customerId = 'CUST-' + user.email.replace(/[^a-z0-9]/gi, '').substring(0, 30);
                const { data: created, error: createError } = await supabase.rpc('create_customer_registration_profile', {
                    payload: {
                        id: customerId,
                        name: fullName,
                        email: user.email,
                        phone: phone,
                        default_pickup_address: ''
                    }
                });
                if (createError) {
                    console.warn('create_customer_registration_profile failed:', createError.message);
                } else if (created) {
                    // Re-fetch the customer row to confirm creation
                    const { data: refreshed } = await supabase
                        .from('customers')
                        .select('id,user_id,email')
                        .or(`user_id.eq.${user.id},email.eq.${user.email}`)
                        .limit(1);
                    if (refreshed?.length) return { allowed: true };
                }
            } catch (createErr) {
                console.warn('create_customer_registration_profile unavailable:', createErr.message);
            }

            if (status?.found && status.status === 'approved' && status.request_scope !== 'customer') {
                return { allowed: false, message: 'Uw account is goedgekeurd, maar uw klantprofiel is nog niet gekoppeld. Controleer uw verificatiemail of contacteer support.' };
            }

            return { allowed: false, message: 'Geen gekoppeld klantprofiel gevonden. Maak eerst een account aan of wacht op goedkeuring.' };
        }

        const authCode = loginParams.get('code');
        if (authCode) {
            try {
                const { error: codeError } = await supabase.auth.exchangeCodeForSession(window.location.href);
                if (codeError) {
                    showError(tr().verifyFailed + ' ' + codeError.message, true);
                } else {
                    showInfo(tr().checking, true);
                    window.history.replaceState({}, document.title, `/PV/index.html${requestedBookingId ? `?booking=${encodeURIComponent(requestedBookingId)}` : ''}`);
                }
            } catch (codeExchangeError) {
                showError(tr().verifyFailed, true);
                console.warn('Supabase verification exchange failed:', codeExchangeError.message);
            }
        }

        const { data: existingSession } = await supabase.auth.getSession();
        if (existingSession?.session?.user) {
            const access = await canOpenPortal(existingSession.session.user);
            if (access.allowed) window.location.replace(portalUrl());
            else showError(access.message, true);
        }

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();

            if (!email || !password) {
                showError(tr().fillCredentials);
                return;
            }

            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ' + tr().loginBusy;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                if (!data.session) throw new Error('Login kon niet worden bevestigd.');

                const access = await canOpenPortal(data.session.user);
                if (!access.allowed) {
                    await supabase.auth.signOut();
                    showError(access.message, true);
                    return;
                }

                window.location.href = portalUrl();
            } catch (err) {
                let message = err.message || tr().invalid;
                const requestStatus = await getRequestStatus(email);
                if (requestStatus?.found && requestStatus.status === 'pending') {
                    message = 'Uw accountaanvraag wacht nog op goedkeuring door FleetConnect.';
                } else if (requestStatus?.found && requestStatus.status === 'approved') {
                    message = 'Uw account is goedgekeurd. Controleer uw verificatiemail of maak uw wachtwoord opnieuw aan via de officiële Supabase verificatielink.';
                } else if (requestStatus?.found && requestStatus.status === 'rejected') {
                    message = 'Uw accountaanvraag werd niet goedgekeurd. Neem contact op met support@fleetconnect.be.';
                } else if (String(message).toLowerCase().includes('email not confirmed')) {
                    message = tr().notConfirmed;
                }
                showError(message, true);
                passInput.value = '';
                passInput.focus();
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        }

        // Event listeners
        loginBtn.addEventListener('click', handleLogin);
        
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        console.log("FleetConnect klantlogin gereed");
    </script>
</body>
</html>
