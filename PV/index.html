<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetConnect | Inloggen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --accent-gold: #c9a03d;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        /* Background map effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(1.05);
            opacity: 0.9;
            z-index: -1;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            max-width: 420px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 700;
        }
        .login-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .field {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
            background: rgba(255,255,255,0.9);
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44,110,158,0.1);
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .info-text {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        .info-text i {
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fas fa-car" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 16px;"></i>
        <h1>FleetConnect</h1>
        <p>Professioneel taxivervoer in BelgiÃ«</p>

        <div id="errorBox" class="error-msg"></div>

        <div class="field">
            <label><i class="fas fa-envelope"></i> E-mailadres</label>
            <input type="email" id="emailInput" placeholder="admin@ryzen.be" value="admin@ryzen.be">
        </div>
        <div class="field">
            <label><i class="fas fa-lock"></i> Wachtwoord</label>
            <input type="password" id="passInput" placeholder="wachtwoord">
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Inloggen
        </button>

        <div class="info-text">
            <i class="fas fa-info-circle"></i> Demo account: admin@ryzen.be / admin@ryzen.be
        </div>
    </div>

    <script>
        // ========== VASTE INLOG GEGEVENS ==========
        const VALID_EMAIL = 'admin@ryzen.be';
        const VALID_PASSWORD = 'admin@ryzen.be';

        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('emailInput');
        const passInput = document.getElementById('passInput');
        const errorBox = document.getElementById('errorBox');

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
            setTimeout(() => {
                errorBox.style.display = 'none';
            }, 4000);
        }

        function handleLogin() {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();

            if (!email || !password) {
                showError('Vul zowel e-mailadres als wachtwoord in.');
                return;
            }

            if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                // Inloggen succesvol - sla sessie op
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('userEmail', email);
                sessionStorage.setItem('userName', 'Admin Ryzen');
                
                // Redirect naar klantenportaal
                window.location.href = 'klantenportaalpv.html';
            } else {
                showError('Ongeldige inloggegevens. Probeer opnieuw.');
                // Reset wachtwoord veld
                passInput.value = '';
                passInput.focus();
            }
        }

        // Event listeners
        loginBtn.addEventListener('click', handleLogin);
        
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        
        // Prefill demo gegevens voor gebruiksgemak
        emailInput.value = 'admin@ryzen.be';
        
        console.log("âœ… Login pagina gereed - Gebruik admin@ryzen.be / admin@ryzen.be");
    </script>
</body>
</html>
