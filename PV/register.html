<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Aanmaken | FleetConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../translations.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBv51ytW1FTJoSGRiD7hLNknGwNcM8cmcM&libraries=places" async defer></script>
    <style>
        :root { --primary: #2c7da0; --primary-dark: #1a5c8c; --bg: #f4f7fc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 8px; font-size: 1.8rem; }
        p { color: #4a627a; font-size: 0.9rem; margin-bottom: 32px; }
        .field { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #4a627a; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px 18px; border: 1px solid #e2edf7; border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1); }
        .btn-register { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-register:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .footer-link { display: inline-block; margin-top: 24px; font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 600; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; display: none; text-align: left; }
        .success-msg { background: #dcfce7; color: #166534; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; display: none; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-user-plus" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 16px;"></i>
        <h1 data-i18n="auth_register_title">Account aanmaken</h1>
        <p data-i18n="auth_register_subtitle">Registreer voor een snellere boekingervaring</p>

        <div id="errorBox" class="error-msg"></div>
        <div id="successBox" class="success-msg"></div>

        <form id="registerForm">
            <div class="field">
                <label data-i18n="auth_fullname">Volledige naam</label>
                <input type="text" id="nameInput" placeholder="Jan Janssen" required>
            </div>
            <div class="field">
                <label data-i18n="auth_email">E-mailadres</label>
                <input type="email" id="emailInput" placeholder="uw@email.be" required>
            </div>
            <div class="field">
                <label data-i18n="auth_phone">Telefoonnummer</label>
                <input type="tel" id="phoneInput" placeholder="+32 4xx xx xx xx" required>
            </div>
            <div class="field">
                <label data-i18n="portal_label_pickup">Standaard ophaallocatie</label>
                <input type="text" id="pickupInput" placeholder="Straat 1, Stad">
            </div>
            <div class="field">
                <label data-i18n="auth_password">Wachtwoord</label>
                <input type="password" id="passInput" placeholder="********" required minlength="6">
            </div>
            <div class="field">
                <label>Herhaal wachtwoord</label>
                <input type="password" id="repeatPassInput" placeholder="********" required minlength="6">
            </div>
            <button type="submit" class="btn-register" id="regBtn" data-i18n="auth_register_btn">Registreren</button>
        </form>

        <a href="/PV/index.html" class="footer-link" data-i18n="auth_already_account">Heeft u al een account? Inloggen</a>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        import { comms } from '../src/modules/communication/index.js';
     
        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const registerForm = document.getElementById('registerForm');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const regBtn = document.getElementById('regBtn');
        const registerParams = new URLSearchParams(window.location.search);
        const requestedBookingId = registerParams.get('booking') || registerParams.get('booking_id') || registerParams.get('id') || '';
        const requestedEmail = registerParams.get('email') || '';

        if (requestedEmail) {
            document.getElementById('emailInput').value = requestedEmail;
        }

        if (requestedBookingId) {
            document.querySelector('.footer-link').href = `/PV/index.html?booking=${encodeURIComponent(requestedBookingId)}`;
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            successBox.style.display = 'none';
        }

        function showSuccess(message) {
            successBox.textContent = message;
            successBox.style.display = 'block';
            errorBox.style.display = 'none';
        }

        function initAddressAutocomplete() {
            const input = document.getElementById('pickupInput');
            if (!input || !window.google?.maps?.places?.Autocomplete) return;
            try {
                new google.maps.places.Autocomplete(input, {
                    fields: ['formatted_address', 'geometry', 'name'],
                    componentRestrictions: { country: ['be'] }
                });
            } catch (err) {
                console.warn('Registration address autocomplete unavailable:', err.message);
            }
        }

        window.addEventListener('load', () => setTimeout(initAddressAutocomplete, 400));

        function loginUrl(email = requestedEmail) {
            const params = new URLSearchParams();
            if (requestedBookingId) params.set('booking', requestedBookingId);
            if (email) params.set('email', email);
            return params.toString() ? `/PV/index.html?${params.toString()}` : '/PV/index.html';
        }

        async function canOpenPortal(user) {
            if (!user?.email) return false;
            try { await supabase.rpc('link_customer_after_registration'); } catch (_) {}
            const { data: customers } = await supabase
                .from('customers')
                .select('id')
                .or(`user_id.eq.${user.id},email.eq.${user.email}`)
                .limit(1);
            return !!customers?.length;
        }

        const { data: existingSession } = await supabase.auth.getSession();
        if (existingSession?.session?.user && await canOpenPortal(existingSession.session.user)) {
            window.location.replace(requestedBookingId
                ? `/PV/klantenportaalpv.html?id=${encodeURIComponent(requestedBookingId)}`
                : '/PV/klantenportaalpv.html');
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const pickup = document.getElementById('pickupInput').value.trim();
            const password = document.getElementById('passInput').value;
            const repeatPassword = document.getElementById('repeatPassInput').value;

            if (password !== repeatPassword) {
                showError('De wachtwoorden komen niet overeen.');
                return;
            }

            try {
                regBtn.disabled = true;
                regBtn.textContent = 'Registratie wordt verwerkt...';
                // 1. Sign up user
                const { data, error: signUpError } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: fullName, phone: phone },
                        emailRedirectTo: requestedBookingId
                            ? `${window.location.origin}/PV/index.html?booking=${encodeURIComponent(requestedBookingId)}&email=${encodeURIComponent(email)}`
                            : `${window.location.origin}/PV/index.html?email=${encodeURIComponent(email)}`
                    }
                });

                if (signUpError) throw signUpError;

                if (data.user) {
                    // 2. Create customer record through a constrained RPC. Link user_id now only when a verified session exists.
                    const customerId = `CUST-${email.replace(/[^a-z0-9]/gi, '').substring(0,30)}`;
                    const { error: dbError } = await supabase
                        .rpc('create_customer_registration_profile', {
                            payload: {
                            id: customerId,
                            name: fullName,
                            email: email,
                            phone: phone,
                            default_pickup_address: pickup
                            }
                        });

                    if (dbError) {
                         console.warn('Customer record insertion delayed or failed:', dbError.message);
                    }

                    const { error: linkError } = await supabase.rpc('link_customer_after_registration');
                    if (linkError) {
                        console.warn('Account request linkage delayed or not applicable:', linkError.message);
                    }

                    await comms.sendAccountWelcome({
                        id: customerId,
                        name: fullName,
                        email,
                        phone
                    }, supabase);

                    showSuccess(`Uw account is aangemaakt. Controleer ${email} voor de verificatie- of bevestigingslink.`);
                    alert(`Uw account is aangemaakt. Controleer ${email} voor de verificatie- of bevestigingslink.`);
                    window.location.href = loginUrl(email);
                }
            } catch (err) {
                showError(err.message);
            } finally {
                regBtn.disabled = false;
                regBtn.textContent = 'Registreren';
            }
        });
    </script>
</body>
</html>
