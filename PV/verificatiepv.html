<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verificatie | FleetConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #2c6e9e; --primary-dark: #1e4a6e; --success: #10b981; --bg-body: #f4f7fc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: #1a2a3a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 480px;
            width: 100%;
            padding: 48px 40px;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon { font-size: 4rem; margin-bottom: 20px; display: block; }
        .icon.loading { color: var(--primary); }
        .icon.success { color: var(--success); }
        .icon.error { color: #ef4444; }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        h1 { font-size: 1.6rem; color: #1a2a3a; margin-bottom: 12px; }
        p { color: #4a627a; font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; }
        .btn-primary {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 8px;
        }
        .btn-primary:hover { background: var(--primary-dark); }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading">
            <span class="icon loading"><i class="fas fa-circle-notch spinner"></i></span>
            <h1>Verificatie wordt verwerkt...</h1>
            <p>Een ogenblik geduld terwijl wij uw e-mailadres bevestigen.</p>
        </div>
        <div id="success" style="display:none;">
            <span class="icon success"><i class="fas fa-check-circle"></i></span>
            <h1>✓ Uw account is succesvol geverifieerd.</h1>
            <p>U kunt nu inloggen.</p>
            <a id="loginLink" href="/PV/index.html" class="btn-primary">Naar inloggen</a>
        </div>
        <div id="error" style="display:none;">
            <span class="icon error"><i class="fas fa-times-circle"></i></span>
            <h1>Verificatie mislukt</h1>
            <p id="errorMsg"></p>
            <a href="/PV/index.html" class="btn-primary">Terug naar inloggen</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbG...8MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function show(id) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        function setLoginLink() {
            // Preserve booking context if present
            const params = new URLSearchParams(window.location.search);
            const booking = params.get('booking') || params.get('booking_id') || '';
            const email = params.get('email') || '';
            const link = document.getElementById('loginLink');
            const next = new URLSearchParams();
            next.set('reason', 'verified');
            if (booking) next.set('booking', booking);
            if (email) next.set('email', email);
            link.href = '/PV/index.html?' + next.toString();
        }

        async function verify() {
            try {
                // 1. If Supabase delivered a ?code= param, exchange it for a session.
                const url = new URL(window.location.href);
                const code = url.searchParams.get('code');
                if (code) {
                    const { error: exError } = await supabase.auth.exchangeCodeForSession(url.href);
                    if (exError) {
                        document.getElementById('errorMsg').textContent = exError.message;
                        show('error');
                        return;
                    }
                }

                // 2. Check for an active session (Supabase implicit-flow puts tokens in the hash
                //    and the JS lib parses them automatically on createClient()).
                let { data: { session }, error: sessError } = await supabase.auth.getSession();
                if (sessError) {
                    document.getElementById('errorMsg').textContent = sessError.message;
                    show('error');
                    return;
                }

                if (session?.user) {
                    setLoginLink();
                    show('success');
                    // Auto-redirect after 3s so the user can read the message first
                    setTimeout(() => {
                        window.location.href = document.getElementById('loginLink').href;
                    }, 3000);
                    return;
                }

                // 3. No session and no code — this is a direct visit to the verification page.
                //    Show an instructive error.
                document.getElementById('errorMsg').textContent = 'Geen verificatiecode gevonden. Open de link uit de verificatiemail in deze browser, of log in op uw account.';
                show('error');
            } catch (err) {
                document.getElementById('errorMsg').textContent = err.message || String(err);
                show('error');
            }
        }

        verify();
    </script>
</body>
</html>
