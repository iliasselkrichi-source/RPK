<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NH | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #0A192F 0%, #0F2A3F 100%); font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { max-width: 500px; width: 100%; background: rgba(255,255,255,0.95); border-radius: 32px; padding: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
    .logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; background: linear-gradient(135deg, #E0E0E0 0%, #FFFFFF 25%, #B0B0B0 50%, #F5F5F5 75%, #A0A0A0 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .tab-buttons { display: flex; gap: 12px; margin-bottom: 1.5rem; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 40px; cursor: pointer; font-weight: 700; }
    .tab-btn.active { background: #0A192F; color: white; }
    .tab-content { display: none; }
    .tab-content.active-tab { display: block; }
    .field { margin-bottom: 1rem; }
    input { width: 100%; padding: 12px; border-radius: 40px; border: 1px solid #ccc; }
    .btn-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, #E0E0E0, #A0A0A0); border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .message { margin-top: 1rem; padding: 10px; border-radius: 40px; display: none; }
    .back-link { display: block; text-align: center; margin-top: 1rem; color: #0A192F; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">NH</div>
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="login">Connexion</button>
    <button class="tab-btn" data-tab="register">Créer un compte</button>
  </div>
  <div id="loginTab" class="tab-content active-tab">
    <form id="loginForm">
      <div class="field"><input type="email" id="loginEmail" placeholder="E-mail" required></div>
      <div class="field"><input type="password" id="loginPassword" placeholder="Mot de passe" required></div>
      <button type="submit" class="btn-submit">Se connecter</button>
    </form>
  </div>
  <div id="registerTab" class="tab-content">
    <form id="registerForm">
      <div class="field"><input type="text" id="registerName" placeholder="Nom complet" required></div>
      <div class="field"><input type="email" id="registerEmail" placeholder="E-mail" required></div>
      <div class="field"><input type="tel" id="registerPhone" placeholder="Téléphone" required></div>
      <div class="field"><input type="password" id="registerPassword" placeholder="Mot de passe (min. 6)" required></div>
      <button type="submit" class="btn-submit">Créer mon compte</button>
    </form>
  </div>
  <div id="message" class="message"></div>
  <a href="KMS7.html" class="back-link">← Retour au site</a>
</div>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const supabase = createClient('https://rreqjjrmvytnwnsidmqi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA');

  // GEEN AUTOMATISCHE DOORVERWIJZING BIJ HET LADEN
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
      document.getElementById(btn.dataset.tab + 'Tab').classList.add('active-tab');
    });
  });

  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      document.getElementById('message').textContent = '❌ ' + error.message;
      document.getElementById('message').style.display = 'block';
    } else {
      window.location.href = 'ClientKMS7.html';
    }
  });

  const registerForm = document.getElementById('registerForm');
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fullName = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const phone = document.getElementById('registerPhone').value.trim();
    const password = document.getElementById('registerPassword').value;
    if (password.length < 6) {
      document.getElementById('message').textContent = '❌ Mot de passe trop court';
      document.getElementById('message').style.display = 'block';
      return;
    }
    const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName, phone } } });
    if (error) {
      document.getElementById('message').textContent = '❌ ' + error.message;
      document.getElementById('message').style.display = 'block';
    } else {
      alert('Compte créé ! Vérifiez votre e-mail.');
    }
  });
</script>
</body>
</html>
