<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fleetconnect Taxi | Inloggen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c7da0;
            --primary-dark: #1a5c8c;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--white);
            max-width: 420px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--primary);
        }
        .login-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .field {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1);
        }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .forgot-password {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .language-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .lang-btn {
            background: #f1f5f9;
            border: 1px solid var(--border-light);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.2s;
            color: var(--text-dark);
            text-decoration: none;
            display: inline-block;
        }
        .lang-btn:hover, .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 24px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }
        .modal-content h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--text-dark);
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-secondary {
            flex: 1;
            background: #f1f5f9;
            color: var(--text-dark);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="language-selector">
            <a href="#" class="lang-btn active" data-lang="nl">Nederlands</a>
            <a href="#" class="lang-btn" data-lang="fr">Français</a>
            <a href="#" class="lang-btn" data-lang="en">English</a>
        </div>

        <i class="fas fa-taxi" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 16px;"></i>
        <h1 id="title">Inloggen</h1>
        <p id="subtitle">Toegang tot het klantenportaal</p>

        <div id="errorBox" class="error-msg"></div>
        <div id="successBox" class="success-msg"></div>

        <div class="field">
            <label id="emailLabel">E-mailadres</label>
            <input type="email" id="emailInput" placeholder="uw@email.be">
        </div>
        <div class="field">
            <label id="passwordLabel">Wachtwoord</label>
            <input type="password" id="passInput" placeholder="••••••••">
        </div>

        <button class="btn-login" id="loginBtn">Inloggen</button>

        <a href="#" class="forgot-password" id="forgotBtn">Wachtwoord vergeten?</a>
    </div>

    <div class="modal" id="forgotModal">
        <div class="modal-content">
            <h2 id="modalTitle">Wachtwoord vergeten</h2>
            <p id="modalText" style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 20px;">Voer uw e-mailadres in om een magische link te ontvangen.</p>
            <div class="field">
                <label id="modalEmailLabel">E-mailadres</label>
                <input type="email" id="forgotEmail" placeholder="uw@email.be">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" id="closeModal">Annuleren</button>
                <button class="btn-login" id="sendMagicBtn" style="margin-top:0;">Stuur magische link</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const translations = {
            nl: {
                title: 'Inloggen',
                subtitle: 'Toegang tot het klantenportaal',
                emailLabel: 'E-mailadres',
                passwordLabel: 'Wachtwoord',
                loginBtn: 'Inloggen',
                forgotBtn: 'Wachtwoord vergeten?',
                modalTitle: 'Wachtwoord vergeten',
                modalText: 'Voer uw e-mailadres in om een magische link te ontvangen.',
                modalEmailLabel: 'E-mailadres',
                cancelBtn: 'Annuleren',
                sendBtn: 'Stuur magische link',
                emailPlaceholder: 'uw@email.be',
                passwordPlaceholder: '••••••••',
                errorEmpty: 'Voer uw e-mailadres en wachtwoord in.',
                errorInvalid: 'Ongeldige inloggegevens.',
                errorGeneric: 'Er is een fout opgetreden. Probeer het later opnieuw.',
                resetSuccess: 'Herstel-instructies gestuurd naar',
                resetError: 'Fout:',
                enterEmail: 'Voer een geldig e-mailadres in.',
                logoutSuccess: '✓ U bent succesvol uitgelogd.',
                sessionExpired: '⏰ Uw sessie is verlopen. Log opnieuw in.',
                loginSuccess: '✓ Ingelogd! Doorverwijzen...'
            },
            fr: {
                title: 'Connexion',
                subtitle: 'Accéder au portail client',
                emailLabel: 'Adresse e-mail',
                passwordLabel: 'Mot de passe',
                loginBtn: 'Se connecter',
                forgotBtn: 'Mot de passe oublié ?',
                modalTitle: 'Mot de passe oublié',
                modalText: 'Entrez votre adresse e-mail pour recevoir un lien magique.',
                modalEmailLabel: 'Adresse e-mail',
                cancelBtn: 'Annuler',
                sendBtn: 'Envoyer le lien magique',
                emailPlaceholder: 'votre@email.fr',
                passwordPlaceholder: '••••••••',
                errorEmpty: 'Veuillez entrer votre e-mail et mot de passe.',
                errorInvalid: 'Identifiants invalides.',
                errorGeneric: 'Une erreur est survenue. Veuillez réessayer plus tard.',
                resetSuccess: 'Instructions de récupération envoyées à',
                resetError: 'Erreur :',
                enterEmail: 'Veuillez entrer une adresse e-mail valide.',
                logoutSuccess: '✓ Vous êtes déconnecté avec succès.',
                sessionExpired: '⏰ Votre session a expiré. Veuillez vous reconnecter.',
                loginSuccess: '✓ Connecté ! Redirection...'
            },
            en: {
                title: 'Login',
                subtitle: 'Access the customer portal',
                emailLabel: 'Email address',
                passwordLabel: 'Password',
                loginBtn: 'Login',
                forgotBtn: 'Forgot password?',
                modalTitle: 'Forgot password',
                modalText: 'Enter your email address to receive a magic link.',
                modalEmailLabel: 'Email address',
                cancelBtn: 'Cancel',
                sendBtn: 'Send magic link',
                emailPlaceholder: 'your@email.com',
                passwordPlaceholder: '••••••••',
                errorEmpty: 'Please enter your email and password.',
                errorInvalid: 'Invalid login credentials.',
                errorGeneric: 'An error occurred. Please try again later.',
                resetSuccess: 'Recovery instructions sent to',
                resetError: 'Error:',
                enterEmail: 'Please enter a valid email address.',
                logoutSuccess: '✓ You have been successfully logged out.',
                sessionExpired: '⏰ Your session has expired. Please login again.',
                loginSuccess: '✓ Logged in! Redirecting...'
            }
        };

        let currentLang = 'nl';
        let isRedirecting = false;

        function getLanguageFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            if (langParam && (langParam === 'nl' || langParam === 'fr' || langParam === 'en')) {
                return langParam;
            }
            const savedLang = localStorage.getItem('preferred_lang');
            if (savedLang && (savedLang === 'nl' || savedLang === 'fr' || savedLang === 'en')) {
                return savedLang;
            }
            return 'nl';
        }

        function applyLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('emailLabel').textContent = t.emailLabel;
            document.getElementById('passwordLabel').textContent = t.passwordLabel;
            document.getElementById('loginBtn').textContent = t.loginBtn;
            document.getElementById('forgotBtn').textContent = t.forgotBtn;
            document.getElementById('modalTitle').textContent = t.modalTitle;
            document.getElementById('modalText').textContent = t.modalText;
            document.getElementById('modalEmailLabel').textContent = t.modalEmailLabel;
            document.getElementById('closeModal').textContent = t.cancelBtn;
            document.getElementById('sendMagicBtn').textContent = t.sendBtn;
            
            document.getElementById('emailInput').placeholder = t.emailPlaceholder;
            document.getElementById('passInput').placeholder = t.passwordPlaceholder;
            document.getElementById('forgotEmail').placeholder = t.emailPlaceholder;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            localStorage.setItem('preferred_lang', lang);
            
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.pushState({}, '', url);
        }

        function showMessage(msg, type) {
            const box = type === 'error' ? document.getElementById('errorBox') : document.getElementById('successBox');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => {
                box.style.display = 'none';
            }, 4000);
        }

        function checkLogoutStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            const logoutReason = urlParams.get('logout');
            
            if (logoutReason === 'success') {
                showMessage(translations[currentLang].logoutSuccess, 'success');
                const url = new URL(window.location);
                url.searchParams.delete('logout');
                window.history.pushState({}, '', url);
            } else if (logoutReason === 'expired') {
                showMessage(translations[currentLang].sessionExpired, 'error');
                const url = new URL(window.location);
                url.searchParams.delete('logout');
                window.history.pushState({}, '', url);
            }
        }

        // BELANGRIJK: Deze functie checkt of er een sessie is,
        // maar doet ALLEEN een redirect als er GEEN logout parameter is
        async function checkSession() {
            // Kijk of we net zijn uitgelogd via de URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const isLogoutRedirect = urlParams.get('logout') === 'success' || urlParams.get('logout') === 'expired';
            
            if (isLogoutRedirect) {
                // Blijf op de inlogpagina! Geen redirect naar portaal
                console.log('Uitlog redirect - blijven op inlogpagina');
                return;
            }
            
            const { data: { session } } = await supabase.auth.getSession();
            
            // Alleen redirecten als er een sessie IS en we NIET bezig zijn met uitloggen
            if (session && !isLogoutRedirect && !isRedirecting) {
                isRedirecting = true;
                window.location.href = `klantenportaalpv.html?lang=${currentLang}`;
            }
        }

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passInput.value.trim();

            if (!email || !password) {
                showMessage(translations[currentLang].errorEmpty, 'error');
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    showMessage(error.message === 'Invalid login credentials' ? translations[currentLang].errorInvalid : error.message, 'error');
                    return;
                }

                if (data.session) {
                    showMessage(translations[currentLang].loginSuccess, 'success');
                    sessionStorage.setItem('loggedInEmail', email);
                    setTimeout(() => {
                        window.location.href = `klantenportaalpv.html?lang=${currentLang}`;
                    }, 1000);
                }
            } catch (err) {
                showMessage(translations[currentLang].errorGeneric, 'error');
            }
        }

        // Event listeners
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('emailInput');
        const passInput = document.getElementById('passInput');
        const forgotBtn = document.getElementById('forgotBtn');
        const forgotModal = document.getElementById('forgotModal');
        const closeModal = document.getElementById('closeModal');
        const sendMagicBtn = document.getElementById('sendMagicBtn');

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const lang = btn.getAttribute('data-lang');
                applyLanguage(lang);
            });
        });

        loginBtn.addEventListener('click', handleLogin);
        emailInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleLogin(); });
        passInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleLogin(); });

        forgotBtn.addEventListener('click', (e) => {
            e.preventDefault();
            forgotModal.style.display = 'flex';
        });

        closeModal.addEventListener('click', () => {
            forgotModal.style.display = 'none';
        });

        forgotModal.addEventListener('click', (e) => {
            if (e.target === forgotModal) {
                forgotModal.style.display = 'none';
            }
        });

        sendMagicBtn.addEventListener('click', async () => {
            const email = document.getElementById('forgotEmail').value.trim();
            if (email) {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/reset-password.html?lang=${currentLang}`,
                });
                if (error) {
                    showMessage(`${translations[currentLang].resetError} ${error.message}`, 'error');
                } else {
                    showMessage(`${translations[currentLang].resetSuccess} ${email}`, 'success');
                    forgotModal.style.display = 'none';
                    document.getElementById('forgotEmail').value = '';
                }
            } else {
                showMessage(translations[currentLang].enterEmail, 'error');
            }
        });

        // Initialiseer
        const initialLang = getLanguageFromURL();
        applyLanguage(initialLang);
        checkLogoutStatus();
        
        // Wacht even voordat we de sessie checken
        setTimeout(() => {
            checkSession();
        }, 500);
    </script>
</body>
</html>
