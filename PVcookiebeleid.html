<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cookiebeleid | Fleetconnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        #background-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .floating-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            height: calc(100vh - 80px);
            overflow-y: auto;
        }
        .floating-container::-webkit-scrollbar { width: 6px; }
        .floating-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .floating-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.3); border-radius: 10px; }
        
        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 24px;
            position: relative;
        }
        .language-menu {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .lang-btn {
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #1a5c8c;
        }
        .lang-btn.active {
            background: #2c7da0;
            color: white;
        }
        .lang-btn:hover:not(.active) {
            background: rgba(44,125,160,0.2);
        }
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1a2a3a;
            border-left: 4px solid #2c7da0;
            padding-left: 20px;
            margin-bottom: 24px;
            margin-top: 0;
        }
        .last-updated {
            color: #2c7da0;
            font-size: 0.8rem;
            margin-bottom: 24px;
            font-weight: 500;
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a5c8c;
            margin: 28px 0 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 6px;
        }
        p, li {
            color: #3a4a5a;
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        ul { margin-left: 24px; margin-bottom: 16px; }
        a { color: #2c7da0; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        
        .cookie-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            overflow: hidden;
        }
        .cookie-table th, .cookie-table td {
            border: 1px solid rgba(0,0,0,0.1);
            padding: 12px 16px;
            text-align: left;
            font-size: 0.85rem;
        }
        .cookie-table th { background: rgba(44, 125, 160, 0.1); font-weight: 600; color: #1a5c8c; }
        
        .footer-links {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .footer-links a {
            margin: 0 12px;
            font-size: 0.8rem;
            color: #1a5c8c;
        }
        .footer-links a:hover { color: #2c7da0; }
        .back-home-btn {
            display: inline-block;
            background: #2c7da0;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .back-home-btn:hover {
            background: #1a5c8c;
            text-decoration: none;
        }
        @media (max-width: 700px) {
            .content-card { padding: 24px 20px; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.1rem; }
            .floating-container { margin: 20px auto; height: calc(100vh - 40px); padding: 0 16px; }
            .cookie-table th, .cookie-table td { padding: 8px 10px; font-size: 0.75rem; }
            .footer-links a { display: inline-block; margin: 6px 8px; }
            .language-menu { top: 10px; right: 15px; gap: 6px; }
            .lang-btn { font-size: 0.7rem; padding: 2px 6px; }
        }
    </style>
</head>
<body>
    <div id="background-map"></div>
    <div class="floating-container">
        <div class="content-card">
            <div class="language-menu">
                <button class="lang-btn" data-lang="nl">NL</button>
                <button class="lang-btn" data-lang="fr">FR</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <h1 id="cookie-title" data-i18n="footer_cookie"></h1>
            <div class="last-updated" id="last-updated"></div>
            
            <h2 id="h2-1"></h2>
            <p id="p-1"></p>
            
            <h2 id="h2-2"></h2>
            <table class="cookie-table" id="cookie-table">
                <thead><tr><th id="th-type"></th><th id="th-purpose"></th><th id="th-consent"></th></tr></thead>
                <tbody>
                    <tr><td id="cell-necessary-name"></td><td id="cell-necessary-desc"></td><td id="cell-necessary-consent"></td></tr>
                    <tr><td id="cell-analytical-name"></td><td id="cell-analytical-desc"></td><td id="cell-analytical-consent"></td></tr>
                    <tr><td id="cell-marketing-name"></td><td id="cell-marketing-desc"></td><td id="cell-marketing-consent"></td></tr>
                </tbody>
            </table>
    
            <h2 id="h2-3"></h2>
            <p id="p-3"></p>
            
            <h2 id="h2-4"></h2>
            <p id="p-4"></p>
            <div style="text-align: center; margin: 24px 0;">
                <button id="openCookieSettingsBtn" style="background:#2c7da0; color:white; padding: 10px 30px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer;"></button>
            </div>
            
            <h2 id="h2-5"></h2>
            <p id="p-5"></p>
            
            <hr>
            <p id="copyright" style="text-align:center; font-size:0.8rem;" data-i18n="footer_copyright"></p>
        </div>
        
        <div class="footer-links" id="footer-links">
            <a href="PV.html">🏠 <span data-i18n="nav_home">Home</span></a> |
            <a href="PVfaq.html">❓ <span data-i18n="tab_home">FAQ</span></a> |
            <a href="PVprivacy.html">🔒 <span data-i18n="footer_privacy">Privacy</span></a> |
            <a href="PVcookiebeleid.html">🍪 <span data-i18n="footer_cookie">Cookiebeleid</span></a> |
            <a href="PValgemene-voorwaarden.html">📜 <span data-i18n="footer_voorwaarden">Algemene voorwaarden</span></a>
        </div>
    </div>
    
    <script src="translations.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('background-map').setView([50.85, 4.35], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        function updateCookieContent(lang) {
            if (window.i18n && lang) {
                i18n.setLanguage(lang);
            }
            const currentLang = document.documentElement.lang || 'nl';

            document.getElementById('last-updated').innerText = i18n.t('cook_last_updated');
            document.getElementById('h2-1').innerText = i18n.t('cook_h2_1');
            document.getElementById('p-1').innerText = i18n.t('cook_p_1');
            document.getElementById('h2-2').innerText = i18n.t('cook_h2_2');
            document.getElementById('th-type').innerText = i18n.t('cook_th_type');
            document.getElementById('th-purpose').innerText = i18n.t('cook_th_purpose');
            document.getElementById('th-consent').innerText = i18n.t('cook_th_consent');
            document.getElementById('cell-necessary-name').innerHTML = `<strong>${i18n.t('cook_necessary_name')}</strong>`;
            document.getElementById('cell-necessary-desc').innerText = i18n.t('cook_necessary_desc');
            document.getElementById('cell-necessary-consent').innerText = i18n.t('cook_necessary_consent');
            document.getElementById('cell-analytical-name').innerHTML = `<strong>${i18n.t('cook_analytical_name')}</strong>`;
            document.getElementById('cell-analytical-desc').innerText = i18n.t('cook_analytical_desc');
            document.getElementById('cell-analytical-consent').innerText = i18n.t('cook_analytical_consent');
            document.getElementById('cell-marketing-name').innerHTML = `<strong>${i18n.t('cook_marketing_name')}</strong>`;
            document.getElementById('cell-marketing-desc').innerText = i18n.t('cook_marketing_desc');
            document.getElementById('cell-marketing-consent').innerText = i18n.t('cook_marketing_consent');
            document.getElementById('h2-3').innerText = i18n.t('cook_h2_3');
            document.getElementById('p-3').innerText = i18n.t('cook_p_3');
            document.getElementById('h2-4').innerText = i18n.t('cook_h2_4');
            document.getElementById('p-4').innerText = i18n.t('cook_p_4');
            document.getElementById('openCookieSettingsBtn').innerText = i18n.t('cook_btn_settings');
            document.getElementById('h2-5').innerText = i18n.t('cook_h2_5');
            document.getElementById('p-5').innerHTML = i18n.t('cook_p_5');

            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateCookieContent(btn.getAttribute('data-lang')));
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateCookieContent();
        });
        
        // Cookie modal functies
        function getCookiePreferences() { 
            const prefs = localStorage.getItem('cookiePreferences'); 
            return prefs ? JSON.parse(prefs) : null; 
        }
        function setCookiePreferences(preferences) { 
            localStorage.setItem('cookiePreferences', JSON.stringify(preferences)); 
        }
        function showCookieModal() {
            const prefs = getCookiePreferences() || { analytical: true, marketing: false };
            const modalHtml = `<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(44,74,94,0.5);backdrop-filter:blur(4px);display:flex;justify-content:center;align-items:center;z-index:10001;"><div style="background:white;border:1px solid #2c7da0;border-radius:48px;padding:2rem;max-width:500px;width:90%;text-align:center;"><h3 style="color:#1a2a3a;">Cookievoorkeuren</h3><label style="display:block;margin:0.8rem 0;"><input type="checkbox" id="allow-analytical" ${prefs.analytical ? 'checked' : ''}> Analytische cookies (anoniem)</label><label style="display:block;margin:0.8rem 0;"><input type="checkbox" id="allow-marketing" ${prefs.marketing ? 'checked' : ''}> Marketingcookies</label><br><button id="save-preferences" style="background:#2c7da0;border:none;padding:10px 24px;border-radius:40px;font-weight:bold;cursor:pointer;color:white;">Opslaan</button><button id="close-modal" style="background:#555;border:none;padding:10px 24px;border-radius:40px;font-weight:bold;cursor:pointer;color:white;margin-left:10px;">Sluiten</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modalOverlay = document.body.lastElementChild;
            document.getElementById('save-preferences')?.addEventListener('click', () => {
                setCookiePreferences({ analytical: document.getElementById('allow-analytical').checked, marketing: document.getElementById('allow-marketing').checked });
                modalOverlay.remove();
            });
            document.getElementById('close-modal')?.addEventListener('click', () => modalOverlay.remove());
        }
        document.getElementById('openCookieSettingsBtn')?.addEventListener('click', showCookieModal);
    </script>
</body>
</html>
