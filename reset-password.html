<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord Herstellen | FleetConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="translations.js"></script>
    <style>
        :root { --primary: #2c7da0; --bg: #f4f7fc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 24px; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #e2edf7; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .error { color: #b91c1c; font-size: 0.85rem; margin-bottom: 20px; display: none; }
        .success { color: #166534; font-size: 0.85rem; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1 data-i18n="auth_new_password"></h1>
        <p style="font-size: 0.9rem; color: #4a627a; margin-bottom: 24px;" data-i18n="auth_forgot_password_desc"></p>
        <div id="error" class="error"></div>
        <div id="success" class="success" data-i18n="auth_password_updated"></div>
        <input type="password" id="password" data-i18n-placeholder="auth_new_password">
        <input type="password" id="confirmPassword" data-i18n-placeholder="auth_confirm_password">
        <button id="resetBtn" data-i18n="auth_update_password_btn"></button>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const resetBtn = document.getElementById('resetBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        resetBtn.addEventListener('click', async () => {
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (!password || password.length < 6) {
                showError(i18n.t('auth_err_password_min'));
                return;
            }
            if (password !== confirm) {
                showError(i18n.t('auth_err_password_mismatch'));
                return;
            }

            const { error } = await supabase.auth.updateUser({ password });

            if (error) {
                showError(error.message);
            } else {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'block';
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            }
        });

        function showError(msg) {
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
