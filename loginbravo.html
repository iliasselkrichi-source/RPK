<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bravo · Inloggen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 25px;
        }
        button {
            background: #3BA9B1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
        .success {
            color: green;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Bravo Klantenportaal</h2>
        <p>Log in met uw e-mail en wachtwoord</p>
        
        <input type="email" id="email" placeholder="E-mailadres" value="admin@ryzen.com">
        <input type="password" id="password" placeholder="Wachtwoord" value="admin@ryzen.com">
        <button id="loginBtn">Inloggen</button>
        
        <div id="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase configuratie
        const SUPABASE_URL = "https://orgbdqaxxkwtpvaxxuep.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2JkcWF4eGt3dHB2YXh4dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTU0NzksImV4cCI6MjA5MTIzMTQ3OX0.TY6hWwzG3q_waVDJhxvuLfFFg5qy0HOxMjcTM0YcJ3Q";
        
        // Maak Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // DOM elementen
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        
        // Login functie
        async function doeLogin() {
            // Leeg message
            messageDiv.innerHTML = '';
            messageDiv.className = '';
            
            // Haal waarden op
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Controle of velden niet leeg zijn
            if (!email || !password) {
                messageDiv.innerHTML = 'Vul zowel e-mail als wachtwoord in.';
                messageDiv.className = 'error';
                return;
            }
            
            // Zet knop op "bezig"
            loginBtn.disabled = true;
            loginBtn.textContent = 'Bezig met inloggen...';
            
            console.log("Proberen in te loggen met:", email);
            
            try {
                // Doe de login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error("Login fout:", error);
                    messageDiv.innerHTML = 'Fout: ' + error.message;
                    messageDiv.className = 'error';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Inloggen';
                    return;
                }
                
                // SUCCES!
                console.log("Login succesvol!", data.user);
                messageDiv.innerHTML = '✅ Succes! Ingelogd als ' + data.user.email;
                messageDiv.className = 'success';
                
                // Sla email op voor klantenportaal
                localStorage.setItem('bravo_profile_email', data.user.email);
                
                // Wacht 1 seconde en ga naar klantenportaal
                setTimeout(function() {
                    window.location.href = "bravoklantenportaal.html";
                }, 1000);
                
            } catch (err) {
                console.error("Onverwachte fout:", err);
                messageDiv.innerHTML = 'Onverwachte fout: ' + err.message;
                messageDiv.className = 'error';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Inloggen';
            }
        }
        
        // Koppel de knop aan de functie
        loginBtn.onclick = doeLogin;
        
        // Ook als je op Enter drukt in een veld
        emailInput.onkeypress = function(e) {
            if (e.key === 'Enter') doeLogin();
        };
        passwordInput.onkeypress = function(e) {
            if (e.key === 'Enter') doeLogin();
        };
        
        console.log("Pagina geladen, knop werkt");
    </script>
</body>
</html>
