<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bravo · Inloggen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F4F4F2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 2rem;
            text-align: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #4E342E;
        }
        .logo span { color: #3BA9B1; }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #6B4C44;
            margin-bottom: 0.4rem;
        }
        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
        }
        .login-btn {
            background: #3BA9B1;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }
        .login-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .error-message {
            background: rgba(220,38,38,0.1);
            border-left: 3px solid #dc2626;
            padding: 0.75rem;
            margin-top: 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #b91c1c;
            text-align: left;
        }
        .success-message {
            background: rgba(59,169,177,0.1);
            border-left: 3px solid #3BA9B1;
            padding: 0.75rem;
            margin-top: 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #2E8A91;
            text-align: left;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.6rem;
            color: #6B4C44;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">Bravo · <span>Horizon of Infinity</span></div>
    <div style="font-size:0.7rem; letter-spacing:3px; margin:0.5rem 0;">Customer Portal · KB‑prefix</div>
    <div style="margin:1rem 0;">❦ ❧ ✦ ❧ ❦</div>

    <div class="input-group">
        <label>E-mailadres</label>
        <input type="email" id="email" class="input-field" placeholder="admin@ryzen.com">
    </div>
    <div class="input-group">
        <label>Wachtwoord</label>
        <input type="password" id="password" class="input-field" placeholder="Wachtwoord">
    </div>
    <button id="loginBtn" class="login-btn">Inloggen <span>→</span></button>

    <div id="messageArea"></div>
    <footer>© 2026 Horizon of Infinity · Klantenportaal</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        // Supabase configuratie
        const SUPABASE_URL = "https://orgbdqaxxkwtpvaxxuep.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2JkcWF4eGt3dHB2YXh4dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTU0NzksImV4cCI6MjA5MTIzMTQ3OX0.TY6hWwzG3q_waVDJhxvuLfFFg5qy0HOxMjcTM0YcJ3Q";
        
        // Wacht tot Supabase geladen is
        function startApp() {
            if (!window.supabase) {
                setTimeout(startApp, 100);
                return;
            }
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const messageArea = document.getElementById('messageArea');
            
            function showMessage(message, type) {
                messageArea.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">${message}</div>`;
            }
            
            async function handleLogin() {
                messageArea.innerHTML = '';
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                if (!email || !password) {
                    showMessage('❌ Vul e-mail en wachtwoord in.', 'error');
                    return;
                }
                
                loginBtn.disabled = true;
                loginBtn.innerHTML = '⏳ Bezig met inloggen...';
                
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    showMessage(`✅ Welkom ${data.user.email}! U wordt doorgestuurd...`, 'success');
                    localStorage.setItem('bravo_profile_email', data.user.email);
                    
                    setTimeout(() => {
                        window.location.href = "bravoklantenportaal.html";
                    }, 1000);
                    
                } catch (error) {
                    let foutMelding = '❌ Inloggen mislukt. ';
                    if (error.message.includes('Invalid login credentials')) {
                        foutMelding += 'Ongeldig e-mailadres of wachtwoord.';
                    } else {
                        foutMelding += error.message;
                    }
                    showMessage(foutMelding, 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Inloggen →';
                }
            }
            
            loginBtn.onclick = handleLogin;
            emailInput.onkeypress = (e) => { if (e.key === 'Enter') handleLogin(); };
            passwordInput.onkeypress = (e) => { if (e.key === 'Enter') handleLogin(); };
            
            console.log("✅ Login pagina gereed - Supabase verbonden");
        }
        
        startApp();
    })();
</script>
</body>
</html>
