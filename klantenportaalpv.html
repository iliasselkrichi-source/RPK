        return `T-KL-${yyyy}${mm}${dd}-${String(counter).padStart(3, '0')}`;

    // --- AUTOCOMPLETE (exact zoals in PV.html) ---
    async function fetchAddresses(query, wrapId) {
        if (query.length < 3) { clearSuggestions(wrapId); return; }
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&countrycodes=be&accept-language=nl&addressdetails=1`;
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const response = await fetch(url, { signal: controller.signal, headers: { 'User-Agent': 'Fleetconnect/2.0' } });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!data.length) { showTempMsg(wrapId, 'Geen adressen gevonden in België'); return; }
            const wrapper = document.getElementById(wrapId);
            const suggestionsDiv = wrapper.querySelector('.suggestions');
            suggestionsDiv.innerHTML = '';
            data.forEach(place => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.setAttribute('data-lat', place.lat);
                div.setAttribute('data-lon', place.lon);
                div.textContent = place.display_name.length > 80 ? place.display_name.substring(0,80)+'…' : place.display_name;
                div.addEventListener('click', (function(lat, lon, name) {
                    return function() {
                        const inputField = wrapId === 'pickupWrap' ? document.getElementById('pickupInput') : document.getElementById('dropoffInput');
                        inputField.value = name;
                        if (wrapId === 'pickupWrap') pickupCoord = { lat: parseFloat(lat), lon: parseFloat(lon) };
                        else dropoffCoord = { lat: parseFloat(lat), lon: parseFloat(lon) };
                        suggestionsDiv.style.display = 'none';
                        if (pickupCoord && dropoffCoord) calculateAndStoreRoute();
                    };
                })(place.lat, place.lon, place.display_name));
                suggestionsDiv.appendChild(div);
            });
            suggestionsDiv.style.display = 'block';
        } catch (error) {
            console.error('Autocomplete error:', error);
            showTempMsg(wrapId, 'Netwerkfout - probeer later opnieuw');
        }
    }
    
    function clearSuggestions(wrapId) {
        const wrapper = document.getElementById(wrapId);
        if (wrapper) {
            const suggestionsDiv = wrapper.querySelector('.suggestions');
            if (suggestionsDiv) suggestionsDiv.style.display = 'none';
        }
    }
    
    function showTempMsg(wrapId, msg) {
        const wrapper = document.getElementById(wrapId);
        if (!wrapper) return;
        const suggestionsDiv = wrapper.querySelector('.suggestions');
        if (!suggestionsDiv) return;
        suggestionsDiv.innerHTML = `<div class="suggestion-item" style="color:#b91c1c;">⚠️ ${msg}</div>`;
        suggestionsDiv.style.display = 'block';
        setTimeout(() => { if (suggestionsDiv.style.display === 'block') suggestionsDiv.style.display = 'none'; }, 5000);
    }

    function initAutocomplete() {
        let pickupTimeout, dropoffTimeout;
        const pickupInput = document.getElementById('pickupInput');
        const dropoffInput = document.getElementById('dropoffInput');
        if (pickupInput) {
            pickupInput.addEventListener('input', (e) => {
                clearTimeout(pickupTimeout);
                const q = e.target.value;
                if (q.length >= 3) pickupTimeout = setTimeout(() => fetchAddresses(q, 'pickupWrap'), 300);
                else clearSuggestions('pickupWrap');
            });
        }
        if (dropoffInput) {
            dropoffInput.addEventListener('input', (e) => {
                clearTimeout(dropoffTimeout);
                const q = e.target.value;
                if (q.length >= 3) dropoffTimeout = setTimeout(() => fetchAddresses(q, 'dropoffWrap'), 300);
                else clearSuggestions('dropoffWrap');
            });
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.suggest-wrapper')) {
                clearSuggestions('pickupWrap');
                clearSuggestions('dropoffWrap');
            }
        });
    }
    
    function initMap() {
        map = L.map('map').setView([50.85, 4.35], 13);
