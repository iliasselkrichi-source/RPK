<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Privacyverklaring | Fleetconnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        #background-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .floating-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            height: calc(100vh - 80px);
            overflow-y: auto;
        }
        .floating-container::-webkit-scrollbar { width: 6px; }
        .floating-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .floating-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.3); border-radius: 10px; }
        
        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 24px;
            position: relative;
        }
        .language-menu {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .lang-btn {
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #1a5c8c;
        }
        .lang-btn.active {
            background: #2c7da0;
            color: white;
        }
        .lang-btn:hover:not(.active) {
            background: rgba(44,125,160,0.2);
        }
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1a2a3a;
            border-left: 4px solid #2c7da0;
            padding-left: 20px;
            margin-bottom: 24px;
            margin-top: 0;
        }
        .last-updated {
            color: #2c7da0;
            font-size: 0.8rem;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .contact-block {
            background: rgba(44, 125, 160, 0.08);
            padding: 20px 24px;
            border-radius: 20px;
            border-left: 3px solid #2c7da0;
            margin-bottom: 24px;
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a5c8c;
            margin: 28px 0 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 6px;
        }
        p, li {
            color: #3a4a5a;
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        ul { margin-left: 24px; margin-bottom: 16px; }
        a { 
            color: #2c7da0;
            text-decoration: none; 
            font-weight: 500; 
        }
        a:hover { text-decoration: underline; }
        hr { margin: 24px 0; border-color: rgba(0,0,0,0.05); }
        
        .footer-links {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .footer-links a {
            margin: 0 12px;
            font-size: 0.8rem;
            color: #1a5c8c;
        }
        .footer-links a:hover { color: #2c7da0; }
        .back-home-btn {
            display: inline-block;
            background: #2c7da0;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .back-home-btn:hover {
            background: #1a5c8c;
            text-decoration: none;
        }
        @media (max-width: 700px) {
            .content-card { padding: 24px 20px; }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.1rem; }
            .floating-container { margin: 20px auto; height: calc(100vh - 40px); padding: 0 16px; }
            .footer-links a { display: inline-block; margin: 6px 8px; }
            .language-menu { top: 10px; right: 15px; gap: 6px; }
            .lang-btn { font-size: 0.7rem; padding: 2px 6px; }
        }
    </style>
</head>
<body>
    <div id="background-map"></div>
    <div class="floating-container">
        <div class="content-card">
            <div class="language-menu">
                <button class="lang-btn" data-lang="nl">NL</button>
                <button class="lang-btn" data-lang="fr">FR</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <h1 id="title" data-i18n="footer_privacy"></h1>
            <div class="last-updated" id="last-updated"></div>
            
            <div class="contact-block" id="contact-block">
            </div>
            
            <h2 id="h2-1"></h2>
            <p id="p-1"></p>
            
            <h2 id="h2-2"></h2>
            <p id="p-2"></p>
            <ul id="list-2">
            </ul>
            
            <h2 id="h2-3"></h2>
            <p id="p-3"></p>
            <ul id="list-3">
            </ul>
            
            <h2 id="h2-4"></h2>
            <ul id="list-4">
            </ul>
            
            <h2 id="h2-5"></h2>
            <p id="p-5"></p>
            
            <h2 id="h2-6"></h2>
            <p id="p-6"></p>
            
            <h2 id="h2-7"></h2>
            <p id="p-7"></p>
            
            <hr>
            <p id="copyright" style="text-align:center; font-size:0.8rem;" data-i18n="footer_copyright"></p>
        </div>
        
        <div class="footer-links" id="footer-links">
            <a href="PV.html">🏠 <span data-i18n="nav_home">Home</span></a> |
            <a href="PVfaq.html">❓ <span data-i18n="tab_home">FAQ</span></a> |
            <a href="PVprivacy.html">🔒 <span data-i18n="footer_privacy">Privacy</span></a> |
            <a href="PVcookiebeleid.html">🍪 <span data-i18n="footer_cookie">Cookiebeleid</span></a> |
            <a href="PValgemene-voorwaarden.html">📜 <span data-i18n="footer_voorwaarden">Algemene voorwaarden</span></a>
        </div>
    </div>
    
    <script src="translations.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('background-map').setView([50.85, 4.35], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        function updatePrivacyContent(lang) {
            if (window.i18n && lang) {
                i18n.setLanguage(lang);
            }
            const currentLang = document.documentElement.lang || 'nl';

            document.getElementById('last-updated').innerText = i18n.t('priv_last_updated');
            document.getElementById('contact-block').innerHTML = "<strong>Fleetconnect</strong><br>België<br>E-mail: <a href='mailto:fleetconnect.os@gmail.com'>fleetconnect.os@gmail.com</a>";
            document.getElementById('h2-1').innerText = i18n.t('priv_h2_1');
            document.getElementById('p-1').innerHTML = i18n.t('priv_p_1');
            document.getElementById('h2-2').innerText = i18n.t('priv_h2_2');
            document.getElementById('p-2').innerText = i18n.t('priv_p_2');

            let list2Html = "";
            for(let i=1; i<=6; i++) list2Html += `<li>${i18n.t('priv_list_2_'+i)}</li>`;
            document.getElementById('list-2').innerHTML = list2Html;

            document.getElementById('h2-3').innerText = i18n.t('priv_h2_3');
            document.getElementById('p-3').innerText = i18n.t('priv_p_3');

            let list3Html = "";
            for(let i=1; i<=4; i++) list3Html += `<li>${i18n.t('priv_list_3_'+i)}</li>`;
            document.getElementById('list-3').innerHTML = list3Html;

            document.getElementById('h2-4').innerText = i18n.t('priv_h2_4');
            let list4Html = "";
            for(let i=1; i<=3; i++) list4Html += `<li>${i18n.t('priv_list_4_'+i)}</li>`;
            document.getElementById('list-4').innerHTML = list4Html;

            document.getElementById('h2-5').innerText = i18n.t('priv_h2_5');
            document.getElementById('p-5').innerText = i18n.t('priv_p_5');
            document.getElementById('h2-6').innerText = i18n.t('priv_h2_6');
            document.getElementById('p-6').innerHTML = i18n.t('priv_p_6');
            document.getElementById('h2-7').innerText = i18n.t('priv_h2_7');
            document.getElementById('p-7').innerHTML = i18n.t('priv_p_7');

            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                updatePrivacyContent(btn.getAttribute('data-lang'));
            });
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            updatePrivacyContent();
        });
    </script>
</body>
</html>
