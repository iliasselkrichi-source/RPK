<!DOCTYPE html>
<html>
<head>
    <title>Simpele Supabase Login Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; padding: 2rem;">
    <h2>🔐 Test Login</h2>
    <p>Gebruiker: <strong>admin@ryzen.com</strong><br>Wachtwoord: <strong>admin@ryzen.com</strong></p>
    
    <input type="email" id="email" placeholder="E-mail" value="admin@ryzen.com" style="width: 250px; padding: 8px;"><br><br>
    <input type="password" id="password" placeholder="Wachtwoord" value="admin@ryzen.com" style="width: 250px; padding: 8px;"><br><br>
    <button onclick="inloggen()" style="padding: 10px 20px; cursor: pointer;">Inloggen</button>
    
    <div id="resultaat" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        const SUPABASE_URL = "https://orgbdqaxxkwtpvaxxuep.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2JkcWF4eGt3dHB2YXh4dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTU0NzksImV4cCI6MjA5MTIzMTQ3OX0.TY6hWwzG3q_waVDJhxvuLfFFg5qy0HOxMjcTM0YcJ3Q";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function inloggen() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultaatDiv = document.getElementById('resultaat');
            
            resultaatDiv.innerHTML = "⏳ Bezig met inloggen...";
            resultaatDiv.style.backgroundColor = "#f0f0f0";
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    resultaatDiv.innerHTML = "❌ FOUT: " + error.message;
                    resultaatDiv.style.backgroundColor = "#ffe0e0";
                    console.error("Fout:", error);
                } else {
                    resultaatDiv.innerHTML = "✅ SUCCES! Ingelogd als: " + data.user.email + "<br>📦 Sla email op in localStorage...<br>🚀 Doorsturen naar bravoklantenportaal.html...";
                    resultaatDiv.style.backgroundColor = "#e0ffe0";
                    localStorage.setItem('bravo_profile_email', data.user.email);
                    
                    // Doorsturen na 1.5 seconde
                    setTimeout(() => {
                        window.location.href = "bravoklantenportaal.html";
                    }, 1500);
                }
            } catch (err) {
                resultaatDiv.innerHTML = "❌ CRITICAL FOUT: " + err.message;
                resultaatDiv.style.backgroundColor = "#ffe0e0";
            }
        }
    </script>
</body>
</html>
