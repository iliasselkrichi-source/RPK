<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bravo · Inloggen | Horizon of Infinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dust-grey: #F4F4F2;
            --espresso: #4E342E;
            --espresso-light: #6B4C44;
            --turquoise: #3BA9B1;
            --turquoise-dark: #2E8A91;
            --frosted-bg: rgba(255, 255, 255, 0.6);
            --frosted-border: rgba(255, 255, 255, 0.3);
            --shadow-espresso: 0 40px 80px rgba(78, 52, 46, 0.12);
            --shadow-espresso-light: 0 30px 60px rgba(78, 52, 46, 0.08);
            --border-radius-soft: 15px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dust-grey);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" opacity="0.85"><path fill="none" stroke="%23A8A8A6" stroke-width="1.2" d="M60,10 L65,25 L80,30 L65,35 L60,50 L55,35 L40,30 L55,25 Z M60,70 L65,85 L80,90 L65,95 L60,110 L55,95 L40,90 L55,85 Z"/><path fill="none" stroke="%23A8A8A6" stroke-width="1" d="M10,60 L25,55 L30,40 L35,55 L50,60 L35,65 L30,80 L25,65 Z M70,60 L85,55 L90,40 L95,55 L110,60 L95,65 L90,80 L85,65 Z"/><circle cx="60" cy="60" r="5" fill="none" stroke="%23A8A8A6" stroke-width="1"/></svg>');
            background-repeat: repeat;
            background-size: 120px 120px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            max-width: 480px;
            width: 100%;
            background: var(--frosted-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius-soft);
            border: 1px solid var(--frosted-border);
            box-shadow: var(--shadow-espresso);
            padding: 2rem;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--espresso);
            letter-spacing: 3px;
        }

        .logo span {
            color: var(--turquoise);
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--turquoise);
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        .arabesk {
            font-size: 1rem;
            color: var(--turquoise);
            margin: 1rem 0;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--espresso-light);
            letter-spacing: 2px;
            margin-bottom: 0.4rem;
        }

        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.5);
            border: 1px solid var(--frosted-border);
            border-radius: 50px;
            padding: 0.8rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--turquoise);
            box-shadow: 0 0 0 2px rgba(59,169,177,0.2);
        }

        .login-btn {
            background: var(--turquoise);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: var(--turquoise-dark);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border-left: 3px solid #dc2626;
            color: #b91c1c;
            font-size: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: left;
        }

        .success-message {
            background: rgba(59, 169, 177, 0.1);
            border-left: 3px solid var(--turquoise);
            color: var(--turquoise-dark);
            font-size: 0.75rem;
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: left;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.6rem;
            color: var(--espresso-light);
            text-align: center;
        }

        @media (max-width: 520px) {
            .login-container {
                padding: 1.5rem;
            }
            .logo {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo-area">
        <div class="logo">Bravo · <span>Horizon of Infinity</span></div>
        <div class="subtitle">Customer Portal · KB‑prefix</div>
        <div class="arabesk">❦ ❧ ✦ ❧ ❦</div>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Gebruikersnaam / E-mail</label>
            <input type="text" id="username" class="input-field" placeholder="Voer uw e-mailadres in" autocomplete="email">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Wachtwoord</label>
            <input type="password" id="password" class="input-field" placeholder="Wachtwoord">
        </div>
        <button type="submit" id="loginButton" class="login-btn">Inloggen <i class="fas fa-arrow-right"></i></button>
    </form>

    <div id="messageArea"></div>
    <footer>© 2026 Horizon of Infinity · Klantenportaal</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============================================================
    // SUPABASE CONFIGURATIE (exact dezelfde als in uw andere bestanden)
    // ============================================================
    const SUPABASE_URL = "https://orgbdqaxxkwtpvaxxuep.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2JkcWF4eGt3dHB2YXh4dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTU0NzksImV4cCI6MjA5MTIzMTQ3OX0.TY6hWwzG3q_waVDJhxvuLfFFg5qy0HOxMjcTM0YcJ3Q";
    
    // Initialiseer Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // DOM elementen
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const messageArea = document.getElementById('messageArea');

    // Hulp functie voor het tonen van berichten
    function showMessage(message, type = 'error') {
        messageArea.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'success-message'}">
            <i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}
        </div>`;
        
        // Automatisch succes bericht verwijderen na 3 seconden (behalve fouten)
        if (type === 'success') {
            setTimeout(() => {
                if (messageArea.innerHTML.includes(message)) {
                    messageArea.innerHTML = '';
                }
            }, 3000);
        }
    }

    // Check of er al een actieve sessie is (direct na laden)
    async function checkExistingSession() {
        try {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error) throw error;
            
            if (session) {
                // Er is al een actieve sessie -> stuur direct door naar klantenportaal
                console.log("Actieve sessie gevonden voor:", session.user.email);
                localStorage.setItem('bravo_profile_email', session.user.email);
                window.location.href = "bravoklantenportaal.html";
            }
        } catch (err) {
            console.error("Fout bij checken sessie:", err.message);
        }
    }

    // Login functie
    async function handleLogin(event) {
        event.preventDefault();
        
        // Input waarden ophalen en opschonen
        const email = usernameInput.value.trim();
        const password = passwordInput.value;
        
        // Validatie
        if (!email || !password) {
            showMessage("❌ Vul zowel e-mailadres als wachtwoord in.");
            return;
        }
        
        // Email validatie (basis check)
        if (!email.includes('@') || !email.includes('.')) {
            showMessage("❌ Voer een geldig e-mailadres in (bijv. naam@domein.com).");
            return;
        }
        
        // UI state: disable knop en toon laden
        loginButton.disabled = true;
        loginButton.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Bezig met inloggen...';
        messageArea.innerHTML = ''; // Vorige berichten wissen
        
        try {
            // Probeer in te loggen met Supabase
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) throw error;
            
            // Login succesvol
            if (data && data.user) {
                console.log("Login succesvol voor:", data.user.email);
                
                // Sla gebruikersemail op in localStorage voor gebruik in klantenportaal
                localStorage.setItem('bravo_profile_email', data.user.email);
                
                // Toon succesbericht
                showMessage(`✅ Welkom terug, ${data.user.email}! U wordt doorgestuurd...`, 'success');
                
                // Korte vertraging zodat gebruiker het bericht ziet, dan doorverwijzen
                setTimeout(() => {
                    window.location.href = "bravoklantenportaal.html";
                }, 1000);
            }
            
        } catch (error) {
            console.error("Login fout:", error.message);
            
            // Specifieke foutmeldingen op basis van Supabase error
            if (error.message.includes("Invalid login credentials")) {
                showMessage("❌ Ongeldige inloggegevens. Controleer uw e-mailadres en wachtwoord.");
            } else if (error.message.includes("Email not confirmed")) {
                showMessage("❌ Uw e-mailadres is nog niet bevestigd. Controleer uw inbox voor de bevestigingslink.");
            } else {
                showMessage(`❌ Fout bij inloggen: ${error.message}`);
            }
            
        } finally {
            // Herstel knop (maar alleen als we niet al doorgestuurd zijn)
            if (loginButton.disabled === true) {
                loginButton.disabled = false;
                loginButton.innerHTML = 'Inloggen <i class="fas fa-arrow-right"></i>';
            }
        }
    }
    
    // Event listener voor het formulier
    loginForm.addEventListener('submit', handleLogin);
    
    // Optionele: Enter toets werkt al door form submit
    
    // Check voor bestaande sessie bij het laden van de pagina
    checkExistingSession();
</script>
</body>
</html>
