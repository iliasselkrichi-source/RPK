<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bravo · Inloggen | Horizon of Infinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dust-grey: #F4F4F2;
            --espresso: #4E342E;
            --espresso-light: #6B4C44;
            --turquoise: #3BA9B1;
            --turquoise-dark: #2E8A91;
            --frosted-bg: rgba(255, 255, 255, 0.6);
            --frosted-border: rgba(255, 255, 255, 0.3);
            --shadow-espresso: 0 40px 80px rgba(78, 52, 46, 0.12);
            --shadow-espresso-light: 0 30px 60px rgba(78, 52, 46, 0.08);
            --border-radius-soft: 15px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dust-grey);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" opacity="0.85"><path fill="none" stroke="%23A8A8A6" stroke-width="1.2" d="M60,10 L65,25 L80,30 L65,35 L60,50 L55,35 L40,30 L55,25 Z M60,70 L65,85 L80,90 L65,95 L60,110 L55,95 L40,90 L55,85 Z"/><path fill="none" stroke="%23A8A8A6" stroke-width="1" d="M10,60 L25,55 L30,40 L35,55 L50,60 L35,65 L30,80 L25,65 Z M70,60 L85,55 L90,40 L95,55 L110,60 L95,65 L90,80 L85,65 Z"/><circle cx="60" cy="60" r="5" fill="none" stroke="%23A8A8A6" stroke-width="1"/></svg>');
            background-repeat: repeat;
            background-size: 120px 120px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            max-width: 480px;
            width: 100%;
            background: var(--frosted-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius-soft);
            border: 1px solid var(--frosted-border);
            box-shadow: var(--shadow-espresso);
            padding: 2rem;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--espresso);
            letter-spacing: 3px;
        }

        .logo span {
            color: var(--turquoise);
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--turquoise);
            text-transform: uppercase;
            margin-top: 0.3rem;
        }

        .arabesk {
            font-size: 1rem;
            color: var(--turquoise);
            margin: 1rem 0;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--espresso-light);
            letter-spacing: 2px;
            margin-bottom: 0.4rem;
        }

        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.5);
            border: 1px solid var(--frosted-border);
            border-radius: 50px;
            padding: 0.8rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--turquoise);
            box-shadow: 0 0 0 2px rgba(59,169,177,0.2);
        }

        .login-btn {
            background: var(--turquoise);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: var(--turquoise-dark);
            transform: translateY(-2px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            margin-top: 1rem;
            padding: 0.6rem;
            background: rgba(185, 28, 28, 0.1);
            border-left: 3px solid #b91c1c;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #b91c1c;
            text-align: left;
        }

        .info-message {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: var(--espresso-light);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.6rem;
            color: var(--espresso-light);
            text-align: center;
        }

        @media (max-width: 520px) {
            .login-container {
                padding: 1.5rem;
            }
            .logo {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo-area">
        <div class="logo">Bravo · <span>Horizon of Infinity</span></div>
        <div class="subtitle">Customer Portal · KB‑prefix</div>
        <div class="arabesk">❦ ❧ ✦ ❧ ❦</div>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> E-mailadres</label>
            <input type="email" id="email" class="input-field" placeholder="uw@email.com" autocomplete="email" required>
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Wachtwoord</label>
            <input type="password" id="password" class="input-field" placeholder="Wachtwoord" autocomplete="current-password" required>
        </div>
        <button type="submit" id="loginBtn" class="login-btn">Inloggen <i class="fas fa-arrow-right"></i></button>
        <div id="errorMsg" class="error-message" style="display: none;"></div>
        <div class="info-message">
            <i class="fas fa-shield-alt"></i> Veilige inlog via Supabase Authenticatie
        </div>
    </form>

    <footer>© 2026 Horizon of Infinity · Klantenportaal</footer>
</div>

<script>
    // Supabase configuratie (dezelfde keys als uw project)
    const SUPABASE_URL = "https://orgbdqaxxkwtpvaxxuep.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9yZ2JkcWF4eGt3dHB2YXh4dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTU0NzksImV4cCI6MjA5MTIzMTQ3OX0.TY6hWwzG3q_waVDJhxvuLfFFg5qy0HOxMjcTM0YcJ3Q";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsgDiv = document.getElementById('errorMsg');

    async function handleLogin(event) {
        event.preventDefault();
        
        // Toon loading state
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Bezig met inloggen...';
        errorMsgDiv.style.display = 'none';
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
            errorMsgDiv.textContent = '❌ Vul zowel e-mailadres als wachtwoord in.';
            errorMsgDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Inloggen <i class="fas fa-arrow-right"></i>';
            return;
        }
        
        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                console.error("Auth error:", error);
                errorMsgDiv.textContent = `❌ Inloggen mislukt: ${error.message}`;
                errorMsgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Inloggen <i class="fas fa-arrow-right"></i>';
                return;
            }
            
            // Inloggen succesvol - sla eventueel gebruikersinfo op
            if (data && data.user) {
                // Bewaar e-mail voor gebruik in het portaal (optioneel)
                localStorage.setItem('bravo_user_email', data.user.email);
                localStorage.setItem('bravo_user_id', data.user.id);
                // Doorverwijzen naar klantenportaal
                window.location.href = "bravoklantenportaal.html";
            } else {
                errorMsgDiv.textContent = '❌ Onbekende fout, probeer opnieuw.';
                errorMsgDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Inloggen <i class="fas fa-arrow-right"></i>';
            }
        } catch (err) {
            console.error("Unexpected error:", err);
            errorMsgDiv.textContent = '❌ Netwerkfout of server niet bereikbaar.';
            errorMsgDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Inloggen <i class="fas fa-arrow-right"></i>';
        }
    }
    
    loginForm.addEventListener('submit', handleLogin);
    
    // Check of er al iemand is ingelogd (optioneel) -> stuur door naar portaal
    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            // Al ingelogd, stuur direct door
            window.location.href = "bravoklantenportaal.html";
        }
    }
    checkSession();
</script>
</body>
</html>
