<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NH - Wachtwoord herstellen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 16px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2dd4bf; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
        .debug { background: #f4f4f4; padding: 8px; font-size: 12px; margin-top: 16px; text-align: left; word-break: break-all; }
    </style>
</head>
<body>
<div class="box">
    <h2>Nieuw wachtwoord instellen</h2>
    <input type="password" id="pw1" placeholder="Nieuw wachtwoord (min. 6 tekens)">
    <input type="password" id="pw2" placeholder="Bevestig wachtwoord">
    <button id="saveBtn" disabled>Wachtwoord opslaan</button>
    <div id="msg"></div>
    <div class="debug" id="debugInfo"></div>
</div>
<script>
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MATA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const saveBtn = document.getElementById('saveBtn');
    const msgDiv = document.getElementById('msg');
    const debugDiv = document.getElementById('debugInfo');
    
    // HAAL TOKEN UIT URL (query parameters)
    const urlParams = new URLSearchParams(window.location.search);
    const tokenHash = urlParams.get('token_hash');
    const type = urlParams.get('type');
    
    // TOON DEBUG INFO
    debugDiv.innerHTML = `🔍 Gevonden token: ${tokenHash ? 'JA (' + tokenHash.substring(0, 20) + '...)' : 'NEE'}<br>🔍 Type: ${type || 'NEE'}<br>🔍 Volledige URL: ${window.location.href}`;
    
    if (!tokenHash || type !== 'recovery') {
        msgDiv.innerHTML = '<span class="error">❌ Ongeldige resetlink. Geen geldige token gevonden. Vraag een nieuwe link aan via de inlogpagina.</span>';
        saveBtn.disabled = true;
    } else {
        msgDiv.innerHTML = '<span class="info">🔐 Token gevonden! Bezig met verifiëren bij Supabase...</span>';
        
        // VERIFIEER TOKEN
        supabase.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' })
            .then(({ data, error }) => {
                if (error) {
                    console.error("Verificatie error:", error);
                    msgDiv.innerHTML = `<span class="error">❌ Fout bij verifiëren: ${error.message}. Vraag een nieuwe resetlink aan.</span>`;
                    saveBtn.disabled = true;
                    return;
                }
                
                if (data.user) {
                    msgDiv.innerHTML = '<span class="success">✅ Sessie actief! Je kunt nu je wachtwoord wijzigen.</span>';
                    saveBtn.disabled = false;
                    debugDiv.innerHTML += `<br>✅ Verificatie gelukt! Gebruiker: ${data.user.email}`;
                } else {
                    msgDiv.innerHTML = '<span class="error">❌ Onbekende fout: geen sessie ontvangen.</span>';
                    saveBtn.disabled = true;
                }
            })
            .catch(err => {
                console.error("Onverwachte fout:", err);
                msgDiv.innerHTML = `<span class="error">❌ Onverwachte fout: ${err.message}</span>`;
                saveBtn.disabled = true;
            });
    }
    
    // WACHTWOORD OPSLAAN
    saveBtn.addEventListener('click', async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        
        if (!p1 || !p2) {
            msgDiv.innerHTML = '<span class="error">Vul alle velden in</span>';
            return;
        }
        if (p1 !== p2) {
            msgDiv.innerHTML = '<span class="error">Wachtwoorden komen niet overeen</span>';
            return;
        }
        if (p1.length < 6) {
            msgDiv.innerHTML = '<span class="error">Minimaal 6 tekens</span>';
            return;
        }
        
        saveBtn.disabled = true;
        saveBtn.innerText = 'Bezig...';
        msgDiv.innerHTML = '<span class="info">🔄 Wachtwoord wordt gewijzigd...</span>';
        
        const { error } = await supabase.auth.updateUser({ password: p1 });
        
        if (error) {
            console.error("Update error:", error);
            msgDiv.innerHTML = `<span class="error">Fout bij wijzigen: ${error.message}</span>`;
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        } else {
            msgDiv.innerHTML = '<span class="success">✅ Wachtwoord succesvol gewijzigd! Je wordt doorgestuurd...</span>';
            await supabase.auth.signOut();
            setTimeout(() => {
                window.location.href = 'partner-login.html';
            }, 2000);
        }
    });
</script>
</body>
</html>
