<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetConnect - Wachtwoord herstellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --accent-gold: #c9a03d;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        .logo { margin-bottom: 24px; }
        .logo i { font-size: 2.5rem; color: var(--primary); margin-bottom: 8px; }
        .logo h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .logo p { color: var(--text-light); font-size: 0.85rem; }
        h2 { font-size: 1.25rem; color: var(--text-dark); margin-bottom: 24px; font-weight: 700; }
        label {
            display: block; text-align: left; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; color: var(--text-light); margin-bottom: 8px; letter-spacing: 0.5px;
        }
        input {
            width: 100%; padding: 14px 18px; border: 1px solid var(--border-light);
            border-radius: 12px; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: 0.2s; outline: none; background: rgba(255,255,255,0.95);
            box-sizing: border-box; margin-bottom: 16px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,110,158,0.1); }
        button {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            font-weight: 700; border: none; border-radius: 12px; font-size: 1rem;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        button:hover { background: var(--primary-dark); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .msg { padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-top: 16px; display: none; text-align: left; }
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #dcfce7; color: #166534; }
        .info { background: #dbeafe; color: #1e4a6e; }
        .footer-text { margin-top: 24px; font-size: 0.75rem; color: var(--text-light); text-align: center; border-top: 1px solid var(--border-light); padding-top: 20px; }
        @media (max-width: 480px) { .box { padding: 30px 24px; } }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <i class="fas fa-car"></i>
        <h1>FleetConnect</h1>
        <p>Partnerportaal</p>
    </div>
    <h2>Wachtwoord herstellen</h2>
    <div id="msg" class="msg"></div>
    <label for="pw1">Nieuw wachtwoord</label>
    <input type="password" id="pw1" placeholder="Minimaal 6 tekens">
    <label for="pw2">Bevestig wachtwoord</label>
    <input type="password" id="pw2" placeholder="Herhaal uw wachtwoord">
    <button id="saveBtn" disabled>Wachtwoord opslaan</button>
    <div class="footer-text">
        <i class="fas fa-shield-alt" style="color: var(--accent-gold);"></i> Uw wachtwoord wordt veilig opgeslagen door Supabase Auth.
    </div>
</div>
<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const saveBtn = document.getElementById('saveBtn');
    const msgDiv = document.getElementById('msg');
    function showMessage(text, type) { msgDiv.textContent = text; msgDiv.className = `msg ${type}`; msgDiv.style.display = 'block'; }

    const urlParams = new URLSearchParams(window.location.search);
    const tokenHash = urlParams.get('token_hash');
    const type = urlParams.get('type');
    if (!tokenHash || type !== 'recovery') {
        showMessage('Ongeldige resetlink. Vraag een nieuwe aan via de partnerportaal-inlogpagina.', 'error');
        saveBtn.disabled = true;
    } else {
        showMessage('Bezig met verifiëren...', 'info');
        supabase.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' })
            .then(({ data, error }) => {
                if (error) throw error;
                if (data.session) {
                    return supabase.auth.setSession({ access_token: data.session.access_token, refresh_token: data.session.refresh_token });
                }
            })
            .then(() => { showMessage('Sessie actief. Stel hieronder uw nieuwe wachtwoord in.', 'info'); saveBtn.disabled = false; })
            .catch(err => { showMessage('Fout: ' + err.message, 'error'); saveBtn.disabled = true; });
    }

    saveBtn.addEventListener('click', async () => {
        const p1 = document.getElementById('pw1').value;
        const p2 = document.getElementById('pw2').value;
        if (!p1 || !p2) { showMessage('Vul alle velden in', 'error'); return; }
        if (p1 !== p2) { showMessage('Wachtwoorden komen niet overeen', 'error'); return; }
        if (p1.length < 6) { showMessage('Wachtwoord moet minimaal 6 tekens bevatten', 'error'); return; }
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bezig...';
        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            showMessage('Fout: ' + error.message, 'error');
            saveBtn.disabled = false;
            saveBtn.innerText = 'Wachtwoord opslaan';
        } else {
            showMessage('Wachtwoord gewijzigd! U wordt doorgestuurd naar het partnerportaal...', 'success');
            await supabase.auth.signOut();
            setTimeout(() => { window.location.href = 'partner-login.html'; }, 2000);
        }
    });
</script>
</body>
</html>
