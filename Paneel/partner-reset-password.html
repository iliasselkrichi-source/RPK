<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NH - Nieuw wachtwoord instellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo i {
            font-size: 3rem;
            color: #2dd4bf;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }
        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
            display: block;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45,212,191,0.2);
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2dd4bf;
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover {
            background: #14b8a6;
            transform: scale(1.02);
        }
        .message {
            padding: 12px;
            border-radius: 16px;
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .success {
            background: #dcfce7;
            color: #166534;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
        }
        .info-text {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .reset-container { padding: 24px 20px; }
            .logo h1 { font-size: 1.5rem; }
            .logo i { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="reset-container">
    <div class="logo">
        <i class="fas fa-taxi"></i>
        <h1>NH Partner</h1>
        <p>Nieuw wachtwoord instellen</p>
    </div>

    <div class="form-group">
        <label>Nieuw wachtwoord</label>
        <input type="password" id="newPassword" placeholder="Minimaal 6 tekens">
    </div>
    <div class="form-group">
        <label>Bevestig wachtwoord</label>
        <input type="password" id="confirmPassword" placeholder="Herhaal wachtwoord">
    </div>
    <button id="resetBtn"><i class="fas fa-check-circle"></i> Wachtwoord opslaan</button>

    <div id="messageBox" class="message"></div>
    <div class="info-text">
        <i class="fas fa-info-circle"></i> Uw wachtwoord wordt veilig opgeslagen.<br>
        Na het wijzigen kunt u inloggen met uw nieuwe wachtwoord.
    </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const resetBtn = document.getElementById('resetBtn');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmInput = document.getElementById('confirmPassword');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `message ${type === 'error' ? 'error' : 'success'}`;
        messageBox.style.display = 'block';
        setTimeout(() => {
            messageBox.style.display = 'none';
        }, 5000);
    }

    resetBtn.addEventListener('click', async () => {
        const newPassword = newPasswordInput.value;
        const confirm = confirmInput.value;

        if (!newPassword || !confirm) {
            showMessage('Vul beide wachtwoordvelden in.', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showMessage('Wachtwoord moet minimaal 6 tekens bevatten.', 'error');
            return;
        }
        if (newPassword !== confirm) {
            showMessage('Wachtwoorden komen niet overeen.', 'error');
            return;
        }

        resetBtn.disabled = true;
        resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bezig...';

        try {
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) throw error;

            showMessage('Wachtwoord succesvol gewijzigd! U wordt doorgestuurd naar de inlogpagina.', 'success');
            setTimeout(() => {
                window.location.href = 'partner-login.html';
            }, 2000);
        } catch (err) {
            showMessage(err.message || 'Er is een fout opgetreden. Probeer opnieuw.', 'error');
            resetBtn.disabled = false;
            resetBtn.innerHTML = '<i class="fas fa-check-circle"></i> Wachtwoord opslaan';
        }
    });
</script>
</body>
</html>
