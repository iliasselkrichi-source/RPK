<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NH - Partner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .language-switch {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
            color: #64748b;
        }
        .lang-btn.active {
            background: #2dd4bf;
            color: #0f172a;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo i {
            font-size: 3rem;
            color: #2dd4bf;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }
        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
            display: block;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45,212,191,0.2);
            outline: none;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2dd4bf;
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button[type="submit"]:hover {
            background: #14b8a6;
            transform: scale(1.02);
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 16px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }
        .forgot-password {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
        }
        .forgot-password a {
            color: #2c7da0;
            cursor: pointer;
            text-decoration: none;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .info-text {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            border: 1px solid #e2e8f0;
            color: #475569;
        }
        @media (max-width: 480px) {
            .login-container { padding: 24px 20px; }
            .logo h1 { font-size: 1.5rem; }
            .logo i { font-size: 2.5rem; }
            .lang-btn { font-size: 0.85rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="language-switch">
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="logo">
        <i class="fas fa-taxi"></i>
        <h1 id="title">NH Partner</h1>
        <p id="subtitle">Partnerportaal</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label id="emailLabel">E-mailadres</label>
            <input type="email" id="email" placeholder="partner@example.com">
        </div>
        <div class="form-group">
            <label id="passwordLabel">Wachtwoord</label>
            <input type="password" id="password" placeholder="Uw wachtwoord">
        </div>
        <button type="submit" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Inloggen</button>
        <div id="errorMsg" class="error-msg"></div>
        <div class="forgot-password">
            <a id="forgotPwLink">Wachtwoord vergeten?</a>
        </div>
    </form>
    <div class="info-text">
        <i class="fas fa-info-circle"></i> Gebruik uw partneraccount om in te loggen.<br>
        Vraag uw inloggegevens aan de beheerder.
    </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Vertalingen (alleen UI)
    const translations = {
        nl: { title: "NH Partner", subtitle: "Partnerportaal", emailLabel: "E-mailadres", passwordLabel: "Wachtwoord", loginBtn: "Inloggen", errorMsg: "Ongeldige inloggegevens of geen partnerrechten." },
        fr: { title: "NH Partenaire", subtitle: "Portail partenaire", emailLabel: "Adresse e-mail", passwordLabel: "Mot de passe", loginBtn: "Se connecter", errorMsg: "Identifiants invalides ou droits partenaire manquants." },
        es: { title: "NH Socio", subtitle: "Portal de socios", emailLabel: "Correo electrónico", passwordLabel: "Contraseña", loginBtn: "Iniciar sesión", errorMsg: "Credenciales inválidas o sin permisos de socio." },
        en: { title: "NH Partner", subtitle: "Partner portal", emailLabel: "Email address", passwordLabel: "Password", loginBtn: "Login", errorMsg: "Invalid credentials or no partner rights." }
    };

    let currentLang = 'nl';
    function updateUILanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('emailLabel').innerText = t.emailLabel;
        document.getElementById('passwordLabel').innerText = t.passwordLabel;
        document.getElementById('loginBtn').innerHTML = `<i class="fas fa-sign-in-alt"></i> ${t.loginBtn}`;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.dataset.lang === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        sessionStorage.setItem('partner_lang', lang);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => updateUILanguage(btn.dataset.lang));
    });
    const savedLang = sessionStorage.getItem('partner_lang') || 'nl';
    updateUILanguage(savedLang);

    // Helper: dynamische basis-URL voor resetlink
    function getBaseUrl() {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            return `${window.location.protocol}//${window.location.host}`;
        }
        return 'https://fleetconnect.be';
    }

    // Inloggen met Supabase Auth
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            errorDiv.textContent = translations[currentLang].errorMsg;
            errorDiv.style.display = 'block';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bezig...';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;

            const role = data.user?.user_metadata?.role || data.user?.app_metadata?.role;
            if (role !== 'partner') {
                await supabase.auth.signOut();
                throw new Error('Geen partnerrechten');
            }

            // Sla minimale info op
            sessionStorage.setItem('partner_logged_in', 'true');
            sessionStorage.setItem('partner_email', email);
            window.location.href = 'partnerspaneel.html';
        } catch (err) {
            errorDiv.textContent = translations[currentLang].errorMsg;
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerHTML = `<i class="fas fa-sign-in-alt"></i> ${translations[currentLang].loginBtn}`;
        }
    });

    // Wachtwoord vergeten (stuurt resetlink met correcte redirect)
    document.getElementById('forgotPwLink').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) {
            errorDiv.textContent = 'Vul eerst uw e-mailadres in.';
            errorDiv.style.display = 'block';
            return;
        }

        const baseUrl = getBaseUrl();
        const redirectTo = `${baseUrl}/Paneel/partner-reset-password.html`;
        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });

        if (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = 'block';
        } else {
            alert(`Een resetlink is verzonden naar ${email}. Controleer uw e-mail.`);
            errorDiv.style.display = 'none';
        }
    });
</script>
</body>
</html>
