<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetConnect - Wachtwoord instellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --accent-gold: #c9a03d;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            background-image: linear-gradient(135deg, #2c6e9e 0%, #1e4a6e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }
        .logo { margin-bottom: 20px; }
        .logo i { font-size: 2.5rem; color: var(--primary); margin-bottom: 8px; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .logo p { color: var(--text-light); font-size: 0.85rem; }
        h2 { font-size: 1.2rem; color: var(--text-dark); margin-bottom: 8px; font-weight: 700; }
        .subtitle { color: var(--text-light); font-size: 0.9rem; margin-bottom: 24px; }
        label {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,110,158,0.1); }
        .field { margin-bottom: 16px; text-align: left; }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover { background: var(--primary-dark); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
            text-align: left;
        }
        .msg.error { background: #fee2e2; color: #b91c1c; display: block; }
        .msg.success { background: #dcfce7; color: #166534; display: block; }
        .msg.info { background: #dbeafe; color: #1e4a6e; display: block; }
        .spinner { width: 20px; height: 20px; border: 2px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <i class="fas fa-car"></i>
            <h1>FleetConnect</h1>
            <p>Partnerportaal</p>
        </div>
        <h2 id="pageTitle">Account activeren</h2>
        <p class="subtitle" id="pageSubtitle">Welkom! Stel uw wachtwoord in om uw account te activeren.</p>

        <div id="message" class="msg"></div>

        <div id="formArea" style="display: none;">
            <div class="field">
                <label for="pw1">Uw wachtwoord</label>
                <input type="password" id="pw1" placeholder="Minimaal 6 tekens" autocomplete="new-password">
            </div>
            <div class="field">
                <label for="pw2">Bevestig wachtwoord</label>
                <input type="password" id="pw2" placeholder="Herhaal uw wachtwoord" autocomplete="new-password">
            </div>
            <button id="saveBtn" disabled>Account activeren</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
        });

        const $ = id => document.getElementById(id);

        function showMsg(text, type) {
            $('message').className = 'msg ' + type;
            $('message').textContent = text;
        }

        // Same logic as reset-password — consume the recovery token
        async function init() {
            await new Promise(r => setTimeout(r, 300));

            const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
            const queryParams = new URLSearchParams(window.location.search);
            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            const errorDesc = hashParams.get('error_description') || hashParams.get('error');
            const queryToken = queryParams.get('token') || queryParams.get('token_hash');

            if (accessToken) {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) { showForm(); return; }
                const { data, error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
                if (data?.session) { showForm(); return; }
                showError(error?.message || 'Sessie kon niet worden gestart.'); return;
            }

            if (queryToken) {
                const { data, error } = await supabase.auth.verifyOtp({ token_hash: queryToken, type: 'recovery' });
                if (data?.session) { showForm(); return; }
                showError(error?.message || 'Token is ongeldig.'); return;
            }

            if (errorDesc) { showError(errorDesc); return; }
            showError('Geen activatielink gevonden. Gebruik de link uit uw e-mail.');
        }

        function showForm() {
            $('formArea').style.display = 'block';
            $('saveBtn').disabled = false;
            $('pageTitle').textContent = 'Account activeren';
            $('pageSubtitle').textContent = 'Kies een wachtwoord om uw account te activeren.';
        }

        function showError(msg) {
            $('pageTitle').textContent = 'Activering mislukt';
            $('pageSubtitle').textContent = 'De link is ongeldig of verlopen.';
            showMsg(msg, 'error');
        }

        $('saveBtn').addEventListener('click', async () => {
            const p1 = $('pw1').value;
            const p2 = $('pw2').value;
            if (!p1 || !p2) { showMsg('Vul beide wachtwoordvelden in.', 'error'); return; }
            if (p1 !== p2) { showMsg('Wachtwoorden komen niet overeen.', 'error'); return; }
            if (p1.length < 6) { showMsg('Wachtwoord moet minimaal 6 tekens bevatten.', 'error'); return; }

            $('saveBtn').disabled = true;
            $('saveBtn').innerHTML = '<span class="spinner"></span> Bezig...';

            try {
                const { error } = await supabase.auth.updateUser({ password: p1 });
                if (error) throw error;
                showMsg('✓ Account geactiveerd! U wordt doorgestuurd naar het partnerportaal...', 'success');
                await supabase.auth.signOut();
                setTimeout(() => { window.location.href = '/Paneel/partner-login.html?reason=activated'; }, 2000);
            } catch (err) {
                showMsg('Fout: ' + (err.message || String(err)), 'error');
                $('saveBtn').disabled = false;
                $('saveBtn').textContent = 'Account activeren';
            }
        });

        init();
    </script>
</body>
</html>
