<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NH - Stel uw wachtwoord in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .set-password-container {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo i {
            font-size: 3rem;
            color: #2dd4bf;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }
        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
            display: block;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45,212,191,0.2);
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2dd4bf;
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover {
            background: #14b8a6;
            transform: scale(1.02);
        }
        .message {
            padding: 12px;
            border-radius: 16px;
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .success {
            background: #dcfce7;
            color: #166534;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
        }
        .info-text {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .set-password-container { padding: 24px 20px; }
            .logo h1 { font-size: 1.5rem; }
            .logo i { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="set-password-container">
    <div class="logo">
        <i class="fas fa-taxi"></i>
        <h1>NH Partner</h1>
        <p>Stel uw wachtwoord in</p>
    </div>

    <div class="form-group">
        <label>Nieuw wachtwoord</label>
        <input type="password" id="newPassword" placeholder="Minimaal 6 tekens">
    </div>
    <div class="form-group">
        <label>Bevestig wachtwoord</label>
        <input type="password" id="confirmPassword" placeholder="Herhaal wachtwoord">
    </div>
    <button id="setPasswordBtn"><i class="fas fa-check-circle"></i> Wachtwoord opslaan</button>

    <div id="messageBox" class="message"></div>
    <div class="info-text">
        <i class="fas fa-info-circle"></i> Kies een veilig wachtwoord dat u later kunt gebruiken om in te loggen.<br>
        U wordt na het instellen doorgestuurd naar de inlogpagina.
    </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyZXFqanJtdnl0bnduc2lkbXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjAxMzcsImV4cCI6MjA5Mzk5NjEzN30.q4M3A6Dix3F_9Im2pw8DUIeE4C-INtUlvImRDM58MTA';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const setBtn = document.getElementById('setPasswordBtn');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmInput = document.getElementById('confirmPassword');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `message ${type === 'error' ? 'error' : 'success'}`;
        messageBox.style.display = 'block';
        // Scroll naar bericht
        messageBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        // Verberg na 8 seconden
        setTimeout(() => {
            messageBox.style.display = 'none';
        }, 8000);
    }

    // Hoofdfunctie: verwerk de magic link en stel sessie in
    async function initializeSession() {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');

        console.log('hashParams:', Object.fromEntries(hashParams));

        if (!accessToken) {
            showMessage('Geen geldige uitnodigingslink gevonden. Vraag een nieuwe aan bij de beheerder.', 'error');
            setBtn.disabled = true;
            return false;
        }

        // Controleer of we al een sessie hebben (ongewenst, maar kan)
        const { data: { session: existingSession } } = await supabase.auth.getSession();
        if (existingSession) {
            console.log('Er is al een actieve sessie');
            // Optioneel: we kunnen de bestaande sessie gebruiken, maar we zetten toch een nieuwe
            await supabase.auth.signOut();
        }

        // Zet de sessie op basis van de token uit de URL
        const { data, error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
        });

        if (error) {
            console.error('Fout bij instellen sessie:', error);
            showMessage('De link is ongeldig of verlopen. Vraag een nieuwe uitnodiging aan.', 'error');
            setBtn.disabled = true;
            return false;
        }

        // Controleer of de sessie nu actief is
        const { data: { session: newSession } } = await supabase.auth.getSession();
        if (!newSession) {
            showMessage('Sessie kon niet worden gestart. Probeer de link opnieuw of neem contact op met beheerder.', 'error');
            setBtn.disabled = true;
            return false;
        }

        console.log('Sessie succesvol ingesteld voor user:', newSession.user.email);
        return true;
    }

    // Wachtwoord opslaan
    setBtn.addEventListener('click', async () => {
        const newPassword = newPasswordInput.value;
        const confirm = confirmInput.value;

        // Validatie
        if (!newPassword || !confirm) {
            showMessage('Vul beide wachtwoordvelden in.', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showMessage('Wachtwoord moet minimaal 6 tekens bevatten.', 'error');
            return;
        }
        if (newPassword !== confirm) {
            showMessage('Wachtwoorden komen niet overeen.', 'error');
            return;
        }

        setBtn.disabled = true;
        setBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bezig...';

        try {
            // Controleer opnieuw of er een sessie is
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                throw new Error('U bent niet ingelogd. Probeer de uitnodigingslink opnieuw te openen.');
            }

            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) throw error;

            showMessage('Wachtwoord succesvol ingesteld! U wordt doorgestuurd naar de inlogpagina.', 'success');
            
            // Log de gebruiker uit (optioneel, maar voorkomt dat hij al ingelogd blijft)
            await supabase.auth.signOut();
            
            setTimeout(() => {
                window.location.href = 'partner-login.html';
            }, 3000);
        } catch (err) {
            console.error('Fout bij opslaan wachtwoord:', err);
            showMessage(err.message || 'Er is een fout opgetreden. Probeer opnieuw.', 'error');
            setBtn.disabled = false;
            setBtn.innerHTML = '<i class="fas fa-check-circle"></i> Wachtwoord opslaan';
        }
    });

    // Start de initialisatie
    initializeSession().then(ok => {
        if (!ok) {
            setBtn.disabled = true;
        } else {
            setBtn.disabled = false;
        }
    });
</script>
</body>
</html>
