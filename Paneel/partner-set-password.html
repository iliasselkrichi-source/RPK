<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FleetConnect - Wachtwoord instellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #2c6e9e;
            --primary-dark: #1e4a6e;
            --accent-gold: #c9a03d;
            --text-dark: #1a2a3a;
            --text-light: #4a627a;
            --bg-body: #f4f7fc;
            --white: #ffffff;
            --border-light: #e2edf7;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            background-image: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        .logo {
            margin-bottom: 24px;
        }
        .logo i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .logo p {
            color: var(--text-light);
            font-size: 0.85rem;
        }
        h2 {
            font-size: 1.25rem;
            color: var(--text-dark);
            margin-bottom: 24px;
            font-weight: 700;
        }
        label {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            outline: none;
            background: rgba(255,255,255,0.95);
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44,110,158,0.1);
        }
        .field {
            margin-bottom: 20px;
            text-align: left;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover { background: var(--primary-dark); transform: translateY(-1px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
        .msg {
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
            text-align: left;
        }
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #dcfce7; color: #166534; }
        .info { background: #dbeafe; color: #1e4a6e; }
        .footer-text {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .box { padding: 30px 24px; }
        }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <i class="fas fa-car"></i>
        <h1>FleetConnect</h1>
        <p>Partnerportaal</p>
    </div>
    <h2>Nieuw wachtwoord instellen</h2>

    <div id="message" class="msg"></div>

    <div class="field">
        <label for="password">Nieuw wachtwoord</label>
        <input type="password" id="password" placeholder="Minimaal 6 tekens">
    </div>
    <div class="field">
        <label for="confirmPassword">Bevestig wachtwoord</label>
        <input type="password" id="confirmPassword" placeholder="Herhaal uw wachtwoord">
    </div>

    <button id="saveBtn" disabled>Wachtwoord opslaan</button>

    <div class="footer-text">
        <i class="fas fa-shield-alt" style="color: var(--accent-gold);"></i> Uw wachtwoord wordt veilig opgeslagen door Supabase Auth.
    </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rreqjjrmvytnwnsidmqi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbG...8MTA';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const saveBtn = document.getElementById('saveBtn');
    const msgDiv = document.getElementById('message');

    function showMessage(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = `msg ${type}`;
        msgDiv.style.display = 'block';
    }

    // Read token from URL — Supabase recovery links come as ?token_hash=...&type=recovery
    // (or sometimes as ?code=... for the PKCE flow)
    const urlParams = new URLSearchParams(window.location.search);
    const tokenHash = urlParams.get('token_hash');
    const otpType = urlParams.get('type') || 'recovery';
    const code = urlParams.get('code');

    if (!tokenHash && !code) {
        showMessage('Geen geldige set-password link gevonden. Vraag uw operator om een nieuwe link.', 'error');
        saveBtn.disabled = true;
    } else {
        // Step 1: verify the recovery OTP (or exchange the code) to establish a session
        (async () => {
            try {
                let verifyResult;
                if (tokenHash) {
                    verifyResult = await supabase.auth.verifyOtp({ token_hash: tokenHash, type: otpType });
                } else {
                    verifyResult = await supabase.auth.exchangeCodeForSession(window.location.href);
                }
                if (verifyResult.error) throw verifyResult.error;
                showMessage('Sessie actief. Stel hieronder uw nieuwe wachtwoord in.', 'info');
                saveBtn.disabled = false;
            } catch (err) {
                showMessage('Fout bij verifiëren van de link: ' + err.message + '. Vraag uw operator om een nieuwe link.', 'error');
                saveBtn.disabled = true;
            }
        })();
    }

    // Step 2: save the new password
    saveBtn.addEventListener('click', async () => {
        const newPassword = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!newPassword || !confirmPassword) {
            showMessage('Vul alle velden in.', 'error');
            return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('Wachtwoorden komen niet overeen.', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showMessage('Wachtwoord moet minimaal 6 tekens bevatten.', 'error');
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Bezig...';
        showMessage('Wachtwoord wordt gewijzigd...', 'info');

        const { error } = await supabase.auth.updateUser({ password: newPassword });

        if (error) {
            showMessage('Fout bij wijzigen: ' + error.message, 'error');
            saveBtn.disabled = false;
            saveBtn.innerHTML = 'Wachtwoord opslaan';
        } else {
            showMessage('Wachtwoord succesvol gewijzigd! U wordt doorgestuurd naar het partnerportaal...', 'success');
            await supabase.auth.signOut();
            setTimeout(() => {
                window.location.href = 'partner-login.html';
            }, 3000);
        }
    });
</script>
</body>
</html>
