<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FleetConnect - Driver Paneel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ========== STIJLEN (volledig functioneel) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #0f172a; color: #e2e8f0; overflow-y: auto; display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s ease; }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .logo .logo-text, .sidebar.collapsed .logo small, .sidebar.collapsed .nav-item span, .sidebar.collapsed .nav-section-title { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; }
        .logo { padding: 24px 20px; font-size: 1.3rem; font-weight: 700; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo i.fa-bars { color: #e2e8f0; font-size: 1.3rem; }
        .logo .logo-text { flex: 1; }
        .nav-menu { padding: 20px 16px; flex: 1; }
        .nav-section { margin-bottom: 20px; }
        .nav-section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b; padding: 8px 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; font-weight: 500; font-size: 0.9rem; color: #cbd5e1; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { background: #1e293b; }
        .nav-item.active { background: #2dd4bf20; color: #2dd4bf; }
        .nav-item i { width: 22px; }
        .nav-item.logout-item { margin-top: 16px; border-top: 1px solid #1e293b; padding-top: 16px; color: #f87171; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: auto; }
        .header { background: white; padding: 20px 32px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .refresh-btn { background: #2dd4bf; color: #0f172a; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .refresh-btn:hover { background: #14b8a6; }
        .user-info { font-size: 0.8rem; color: #64748b; }
        .content { padding: 32px; }
        .filter-bar { background: white; padding: 8px 16px; border-radius: 48px; margin-bottom: 24px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; border: 1px solid #e2e8f0; }
        .filter-group { display: flex; align-items: center; gap: 6px; background: #f8fafc; padding: 4px 12px; border-radius: 32px; border: 1px solid #e2e8f0; }
        .filter-group label { font-size: 0.7rem; font-weight: 600; }
        .filter-group input { border: none; background: transparent; padding: 6px 0; font-size: 0.8rem; width: 120px; outline: none; }
        .filter-actions button { padding: 6px 14px; border-radius: 32px; border: none; cursor: pointer; font-weight: 500; font-size: 0.75rem; }
        .btn-filter { background: #0f172a; color: white; }
        .btn-reset { background: #e2e8f0; color: #1e293b; }
        .orders-table-wrapper { overflow-x: auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .orders-table { width: 100%; border-collapse: collapse; }
        .orders-table th, .orders-table td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; font-size: 0.8rem; text-align: left; white-space: nowrap; }
        
        /* Route kolom styling - ingekort met tooltip */
        .route-cell {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
            border-bottom: 1px dotted #cbd5e1;
        }
        .route-cell:hover {
            background-color: #f1f5f9;
        }
        
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-accepted { background: #dbeafe; color: #1e40af; }
        .status-assigned { background: #e0f2fe; color: #0369a1; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        .action-btn { background: #2dd4bf; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.7rem; margin-right: 6px; }
        .profile-card, .wiki-container { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .profile-row { display: flex; padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
        .profile-label { width: 140px; font-weight: 600; color: #475569; }
        .profile-value { flex: 1; color: #1e293b; }
        .finance-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .finance-stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .finance-stat-card .value { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .finance-stat-card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin-top: 8px; }
        .chart-container { background: white; border-radius: 20px; padding: 20px; margin-top: 24px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 40px; z-index: 2000; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .language-switch { display: flex; gap: 8px; background: #f1f5f9; padding: 4px 12px; border-radius: 40px; margin-right: 8px; }
        .lang-btn { background: none; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 4px 10px; border-radius: 30px; transition: 0.2s; color: #475569; }
        .lang-btn.active { background: #2dd4bf; color: #0f172a; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 20px; max-width: 500px; width: 90%; padding: 24px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .modal-btn { padding: 8px 20px; border-radius: 40px; border: none; cursor: pointer; font-weight: 500; }
        .modal-btn.confirm { background: #10b981; color: white; }
        .modal-btn.cancel { background: #e2e8f0; color: #1e293b; }
        .fiche-row { display: flex; padding: 6px 0; font-size: 0.85rem; }
        .fiche-label { width: 120px; font-weight: 600; color: #475569; }
        @media (max-width: 768px) { .content { padding: 16px; } .finance-stats-grid { grid-template-columns: 1fr; } .filter-group input { width: 100px; } }
        button, .nav-item, .lang-btn, .refresh-btn, .modal-btn { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        canvas { max-width: 100%; height: auto !important; }
        .demo-badge { background: #f59e0b; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        /* Rapport-stijlen */
        .report-section { margin-bottom: 28px; }
        .report-section h3 { color: #1e4a6e; margin-bottom: 12px; font-size: 1.2rem; border-left: 4px solid #2dd4bf; padding-left: 12px; }
        .report-section h4 { color: #2c6e9e; margin: 16px 0 8px; }
        .report-table { width: 100%; border-collapse: collapse; margin: 12px 0; background: #f8fafc; border-radius: 12px; }
        .report-table th, .report-table td { border: 1px solid #e2edf7; padding: 8px 12px; text-align: left; font-size: 0.85rem; }
        .report-table th { background: #eef2fa; }
        .highlight-box { background: #fff8e7; border-left: 4px solid #c9a03d; padding: 16px; margin: 16px 0; border-radius: 12px; }
        .code-inline { background: #1e2a36; color: #e2e8f0; padding: 2px 6px; border-radius: 6px; font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body>

            <i class="fas fa-taxi"></i> FleetConnect

    <div class="nav-menu">

<!-- Logout modal -->

<!-- Modal voor rit details + voltooien -->
<div id="rideModal" class="modal">
    <div class="modal-content">
        <h3 id="rideModalTitle">Rit details</h3>
        <div id="rideModalBody"></div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="app.closeRideModal()">Sluiten</button>

</div>

<div id="toast" class="toast"></div>

<script>
    // ==================== DEMO DATA (met lange adressen voor tooltip demo) ====================
    let myRides = [
        { id: "T-PV-20260601-001", datetime: "01-06-2026", time: "09:30", name: "Mevr. De Vries", pickup: "Antwerpen Centraal, Antwerpen, Vlaanderen, 2000, BelgiÃ«", destination: "Brussels Airport, Zaventem, Vlaams-Brabant, 1930, BelgiÃ«", vehicle: "Standaard", amount: 45.00, status: "assigned" },
        { id: "T-PV-20260601-002", datetime: "01-06-2026", time: "14:15", name: "Dhr. Peeters", pickup: "Mechelen Nekkerhal, Mechelen, Antwerpen, 2800, BelgiÃ«", destination: "Antwerpen Haven, Antwerpen, 2000, BelgiÃ«", vehicle: "Break", amount: 32.50, status: "assigned" },
        { id: "T-PV-20260602-003", datetime: "02-06-2026", time: "08:00", name: "Mevr. Claes", pickup: "Leuven Station, Leuven, Vlaams-Brabant, 3000, BelgiÃ«", destination: "Zaventem Brussels Airport, Zaventem, 1930, BelgiÃ«", vehicle: "Exclusieve", amount: 67.00, status: "assigned" }
    ];
    let historyRides = [
        { id: "T-PV-20260530-045", datetime: "30-05-2026", time: "11:20", name: "Dhr. Janssen", pickup: "Brussel Zuid, Brussel, 1060, BelgiÃ«", destination: "Luik, LiÃ¨ge, 4000, BelgiÃ«", vehicle: "Standaard", amount: 87.50, status: "completed" },
        { id: "T-PV-20260529-032", datetime: "29-05-2026", time: "18:45", name: "Mevr. Willems", pickup: "Gent Sint-Pieters, Gent, Oost-Vlaanderen, 9000, BelgiÃ«", destination: "Oostende, West-Vlaanderen, 8400, BelgiÃ«", vehicle: "Mini Van", amount: 64.00, status: "completed" },
        { id: "T-PV-20260528-021", datetime: "28-05-2026", time: "07:30", name: "Dhr. Maes", pickup: "Hasselt, Limburg, 3500, BelgiÃ«", destination: "Eindhoven Airport, Eindhoven, Nederland", vehicle: "Break", amount: 112.00, status: "completed" }
    ];
    
    // Helper functie om route in te korten
    function shortenRoute(pickup, destination) {
        const shortenAddress = (address) => {
            if (!address) return '';
            const parts = address.split(',').map(p => p.trim());
            if (parts.length <= 2) return address;
            let result = parts[0];
            if (parts.length >= 2 && parts[1].length < 50) result += ', ' + parts[1];
            else if (parts.length >= 3 && parts[2].length < 50) result += ', ' + parts[2];
            if (result.length > 55) result = result.substring(0, 52) + '...';
            return result;
        };
        return `${shortenAddress(pickup)} â†’ ${shortenAddress(destination)}`;
    }
    
    function getFullRoute(pickup, destination) {
        return `${pickup || ''} â†’ ${destination || ''}`;
    }
    
    let totalRides = 0, totalAmount = 0, avgAmount = 0, chartLabels = [], chartValues = [];
    let revenueChart = null;

    function updateFinanceData() {
        totalRides = historyRides.length;
        totalAmount = historyRides.reduce((sum, r) => sum + (parseFloat(r.amount) || 0), 0);
        avgAmount = totalRides > 0 ? totalAmount / totalRides : 0;
        const monthly = {};
        historyRides.forEach(ride => {
            if (ride.datetime) {
                const [d, m, y] = ride.datetime.split('-');
                const key = `${y}-${m}`;
                monthly[key] = (monthly[key] || 0) + (parseFloat(ride.amount) || 0);
            }
        });
        chartLabels = Object.keys(monthly).sort();
        chartValues = chartLabels.map(l => monthly[l]);
    }
    updateFinanceData();

    // ==================== VERTALINGEN ====================
    const translations = {
        nl: {
            logoSubtext: "Driver Paneel", navRides: "ðŸš– RITTEN", navMyRides: "Mijn Ritten", navHistory: "Historiek",
            navFinanceTitle: "ðŸ’° FINANCIÃ‹N", navFinance: "Financieel", navProfileTitle: "ðŸ‘¤ PROFIEL", navProfileText: "Mijn Profiel",
            navWikiTitle: "â„¹ï¸ INFO", navWiki: "Wiki Agent", logoutText: "Uitloggen", logoutTitle: "Uitloggen",
            logoutConfirmMsg: "Weet u zeker dat u wilt uitloggen?", logoutCancel: "Annuleren", logoutConfirm: "Uitloggen",
            refreshText: "Vernieuwen", pageTitleMyRides: "Mijn Ritten", pageTitleHistory: "Historiek", pageTitleProfile: "Mijn Profiel",
            pageTitleFinance: "Financieel Overzicht", pageTitleWiki: "Wiki Agent",
            filterOrderId: "Rit ID", filterName: "Klantnaam", search: "Zoeken", reset: "Reset",
            tableId: "ID", tableDateTime: "Datum/Tijd", tableCustomer: "Klant", tableRoute: "Route", tableVehicle: "Voertuig", tableStatus: "Status", tableAmount: "Bedrag", tableAction: "Actie",
            noData: "ðŸ“­ Geen ritten gevonden",
            profileName: "Naam", profileEmail: "E-mail", profileVehicle: "Voertuig", profilePlate: "Nummerplaat",
            profileFooter: "Dit is een demonstratieomgeving. Uw echte gegevens worden via de database geladen.",
            financeTotalRides: "Totaal ritten", financeTotalAmount: "Totale omzet", financeAvgAmount: "Gemiddeld per rit",
            financePeriodLabel: "Alle voltooide ritten", chartLabel: "Omzet per maand (â‚¬)", noChartData: "Geen data",
            toastRefresh: "Gegevens vernieuwd", toastComplete: "Rit gemarkeerd als voltooid", toastError: "Fout",
            btnView: "Bekijk", btnComplete: "Voltooien", rideDetailTitle: "Rit details"
        },
        fr: {
            logoSubtext: "Portail Chauffeur", navMyRides: "Mes Courses", navHistory: "Historique",
            btnView: "Voir", btnComplete: "Terminer", rideDetailTitle: "DÃ©tails de la course",
            toastComplete: "Course terminÃ©e", noData: "ðŸ“­ Aucune course trouvÃ©e",
            pageTitleMyRides: "Mes Courses", pageTitleHistory: "Historique", pageTitleFinance: "AperÃ§u financier",
            financeTotalRides: "Courses totales", financeTotalAmount: "Chiffre d'affaires", financeAvgAmount: "Moyenne par course",
            tableId: "ID", tableDateTime: "Date/Heure", tableCustomer: "Client", tableRoute: "Trajet", tableVehicle: "VÃ©hicule", tableStatus: "Statut", tableAmount: "Montant", tableAction: "Action",
            filterOrderId: "ID Course", filterName: "Client", search: "Rechercher", reset: "RÃ©initialiser",
            profileName: "Nom", profileEmail: "E-mail", profileVehicle: "VÃ©hicule", profilePlate: "Plaque",
            logoutText: "DÃ©connexion", refreshText: "Actualiser"
        },
        en: {
            logoSubtext: "Driver Panel", navMyRides: "My Rides", navHistory: "History",
            btnView: "View", btnComplete: "Complete", rideDetailTitle: "Ride details",
            toastComplete: "Ride completed", noData: "ðŸ“­ No rides found",
            pageTitleMyRides: "My Rides", pageTitleHistory: "History", pageTitleFinance: "Financial Overview",
            financeTotalRides: "Total rides", financeTotalAmount: "Total revenue", financeAvgAmount: "Average per ride",
            tableId: "ID", tableDateTime: "Date/Time", tableCustomer: "Customer", tableRoute: "Route", tableVehicle: "Vehicle", tableStatus: "Status", tableAmount: "Amount", tableAction: "Action",
            filterOrderId: "Ride ID", filterName: "Customer", search: "Search", reset: "Reset",
            profileName: "Name", profileEmail: "Email", profileVehicle: "Vehicle", profilePlate: "License plate",
            logoutText: "Logout", refreshText: "Refresh"
        }
    };

    let currentLang = 'nl';
    function t(key) { return translations[currentLang]?.[key] !== undefined ? translations[currentLang][key] : key; }

    // ==================== APP OBJECT ====================
    const app = {
        currentTab: 'myrides',

        toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); },
        showToast(msg, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        },
        refreshAllData() { 
            this.showToast(t('toastRefresh'));
            updateFinanceData();
            this.refreshCurrentTab();
        },
        closeLogoutModal() { document.getElementById('logoutModal').style.display = 'none'; },
        showLogoutModal() { document.getElementById('logoutModal').style.display = 'flex'; },
        confirmLogout() { 
            this.showToast("Uitgelogd (demo)");
            setTimeout(() => { window.location.href = 'driver-login.html'; }, 500);
        },
        closeRideModal() { document.getElementById('rideModal').style.display = 'none'; },
        showRideModal(ride) {
            this.currentRideForModal = ride;
            const body = document.getElementById('rideModalBody');
            const completeBtn = document.getElementById('completeRideBtn');
            const isCompleted = ride.status === 'completed';
            const fullRoute = getFullRoute(ride.pickup, ride.destination);
            body.innerHTML = `
                <div class="fiche-row"><span class="fiche-label">Rit ID:</span><span>${ride.id}</span></div>
                <div class="fiche-row"><span class="fiche-label">Datum/Tijd:</span><span>${ride.datetime} ${ride.time}</span></div>
                <div class="fiche-row"><span class="fiche-label">Klant:</span><span>${ride.name}</span></div>
                <div class="fiche-row"><span class="fiche-label">Route:</span><span title="${fullRoute}">${shortenRoute(ride.pickup, ride.destination)}</span></div>
                <div class="fiche-row"><span class="fiche-label">Voertuig:</span><span>${ride.vehicle}</span></div>
                <div class="fiche-row"><span class="fiche-label">Bedrag:</span><span>â‚¬ ${(parseFloat(ride.amount)||0).toFixed(2)}</span></div>
                <div class="fiche-row"><span class="fiche-label">Status:</span><span>${ride.status === 'assigned' ? 'Toegewezen' : (ride.status === 'completed' ? 'Voltooid' : ride.status)}</span></div>
            `;
            if (!isCompleted && ride.status === 'assigned') {
                completeBtn.style.display = 'inline-block';
                completeBtn.onclick = () => this.completeRide(ride.id);
            } else {
                completeBtn.style.display = 'none';
            }
            document.getElementById('rideModalTitle').innerText = t('rideDetailTitle');
            document.getElementById('rideModal').style.display = 'flex';
        },
        completeRide(rideId) {
            if (!confirm('Weet u zeker dat u deze rit als voltooid wilt markeren?')) return;
            const index = myRides.findIndex(r => r.id === rideId);
            if (index !== -1) {
                const completedRide = { ...myRides[index], status: 'completed' };
                historyRides.unshift(completedRide);
                myRides.splice(index, 1);
                updateFinanceData();
                this.refreshCurrentTab();
                this.showToast(t('toastComplete'));
                this.closeRideModal();
            } else {
                this.showToast(t('toastError'), true);
            }
        },
        switchTab(tabName) {
            this.currentTab = tabName;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('data-tab') === tabName) item.classList.add('active');
                else item.classList.remove('active');
            });
            this.refreshCurrentTab();
        },
        refreshCurrentTab() {
            if (this.currentTab === 'myrides') this.renderMyRides();
            else if (this.currentTab === 'history') this.renderHistory();
            else if (this.currentTab === 'profile') this.renderProfile();
            else if (this.currentTab === 'finance') this.renderFinance();
            else if (this.currentTab === 'wiki') this.renderWiki();
        },
        renderMyRides() {
            this.genericTableRender('myrides', myRides, true);
            document.getElementById('pageTitle').innerHTML = t('pageTitleMyRides') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        renderHistory() {
            this.genericTableRender('history', historyRides, false);
            document.getElementById('pageTitle').innerHTML = t('pageTitleHistory') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        genericTableRender(type, rides, showAction) {
            let html = `<div class="filter-bar">
                <div class="filter-group"><label>${t('filterOrderId')}</label><input type="text" id="filterOrder" placeholder="${t('search')}"></div>
                <div class="filter-group"><label>${t('filterName')}</label><input type="text" id="filterName" placeholder="${t('search')}"></div>
                <div class="filter-actions">
                    <button class="btn-filter" onclick="app.applyFilters('${type}')">${t('search')}</button>
                    <button class="btn-reset" onclick="app.resetFilters('${type}')">${t('reset')}</button>
                </div>
            </div>
            <div class="orders-table-wrapper"><table class="orders-table"><thead><tr><th>${t('tableId')}</th><th>${t('tableDateTime')}</th><th>${t('tableCustomer')}</th><th>${t('tableRoute')}</th><th>${t('tableVehicle')}</th><th>${t('tableStatus')}</th>` + (type === 'history' ? `<th>${t('tableAmount')}</th>` : '') + (showAction ? `<th>${t('tableAction')}</th>` : '') + `</thead><tbody id="${type}TableBody"></tbody>}</div>`;
            document.getElementById('contentArea').innerHTML = html;
            this.renderTableBody(type, rides, showAction);
        },
        renderTableBody(type, rides, showAction) {
            const tbody = document.getElementById(`${type}TableBody`);
            if (!tbody) return;
            if (rides.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${(type==='history'?7:6)+(showAction?1:0)}" style="text-align:center; padding:40px;">${t('noData')}</td></tr>`;
                return;
            }
            tbody.innerHTML = rides.map(r => {
                let statusClass = r.status === 'assigned' ? 'status-assigned' : 'status-completed';
                let statusText = r.status === 'assigned' ? 'Toegewezen' : 'Voltooid';
                const shortRoute = shortenRoute(r.pickup, r.destination);
                const fullRoute = getFullRoute(r.pickup, r.destination);
                let row = `<tr>
                    <td style="white-space: nowrap;">${r.id}</td>
                    <td style="white-space: nowrap;">${r.datetime} ${r.time || ''}</td>
                    <td style="white-space: nowrap;">${r.name}</td>
                    <td class="route-cell" title="${fullRoute.replace(/"/g, '&quot;')}" style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: help;">${shortRoute}</span></td>
                    <td style="white-space: nowrap;">${r.vehicle}</td>
                    <td style="white-space: nowrap;"><span class="status-badge ${statusClass}">${statusText}</span></td>`;
                if (type === 'history') row += `<td style="white-space: nowrap;">â‚¬${(parseFloat(r.amount)||0).toFixed(2)}</span></td>`;
                if (showAction) row += `<td style="white-space: nowrap;"><button class="action-btn" onclick='app.showRideModal(${JSON.stringify(r).replace(/'/g, "&#39;")})'>${t('btnView')}</button></td>`;
                row += `</tr>`;
                return row;
            }).join('');
        },
        applyFilters(type) {
            let orderFilter = document.getElementById('filterOrder')?.value.toLowerCase() || '';
            let nameFilter = document.getElementById('filterName')?.value.toLowerCase() || '';
            let rides = type === 'myrides' ? myRides : historyRides;
            let filtered = rides.filter(r => (!orderFilter || r.id.toLowerCase().includes(orderFilter)) && (!nameFilter || r.name.toLowerCase().includes(nameFilter)));
            this.renderTableBody(type, filtered, type === 'myrides');
        },
        resetFilters(type) {
            document.getElementById('filterOrder').value = '';
            document.getElementById('filterName').value = '';
            this.renderTableBody(type, type === 'myrides' ? myRides : historyRides, type === 'myrides');
        },
        renderProfile() {
            let html = `<div class="profile-card">
                <h3><i class="fas fa-user-circle"></i> ${t('navProfileText')}</h3>
                <div class="profile-row"><div class="profile-label">${t('profileName')}:</div><div class="profile-value">Jan Janssens</div></div>
                <div class="profile-row"><div class="profile-label">${t('profileEmail')}:</div><div class="profile-value">jan.janssens@fleetconnect.be</div></div>
                <div class="profile-row"><div class="profile-label">${t('profileVehicle')}:</div><div class="profile-value">Tesla Model 3</div></div>
                <div class="profile-row"><div class="profile-label">${t('profilePlate')}:</div><div class="profile-value">1-ABC-123</div></div>
                <p style="margin-top:20px; font-size:0.75rem; color:#64748b;"><i class="fas fa-laptop"></i> ${t('profileFooter')}</p>
            </div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitleProfile') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        renderFinance() {
            updateFinanceData();
            let html = `<div class="finance-stats-grid">
                            <div class="finance-stat-card"><div class="value">${totalRides}</div><div class="label">${t('financeTotalRides')}</div></div>
                            <div class="finance-stat-card"><div class="value">â‚¬${totalAmount.toFixed(2)}</div><div class="label">${t('financeTotalAmount')}</div></div>
                            <div class="finance-stat-card"><div class="value">â‚¬${avgAmount.toFixed(2)}</div><div class="label">${t('financeAvgAmount')}</div></div>
                        </div>
                        <p style="margin-bottom:16px;">${t('financePeriodLabel')}</p>
                        <div class="chart-container"><canvas id="revenueChart" width="400" height="200"></canvas></div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitleFinance') + ' <span class="demo-badge">DEMO MODE</span>';
            const ctx = document.getElementById('revenueChart')?.getContext('2d');
            if (ctx) {
                if (revenueChart) revenueChart.destroy();
                revenueChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: chartLabels.length ? chartLabels : [t('noChartData')], datasets: [{ label: t('chartLabel'), data: chartValues.length ? chartValues : [0], backgroundColor: '#2dd4bf', borderRadius: 8 }] },
                    options: { responsive: true }
                });
            }
        },
        renderWiki() {
            let html = `<div class="wiki-container">
                <h2><i class="fas fa-robot"></i> Wiki Agent â€“ Uitgebreid rapport Driver Paneel</h2>
                <p style="margin-bottom: 20px;">Dit document beschrijft de volledige werking, dataverkeer, authenticatie en maandelijkse afrekening van het FleetConnect Driver Paneel. Het rapport dient als naslagwerk voor chauffeurs en technisch beheer.</p>
                
                <div class="report-section">
                    <h3>1. Inleiding & doel</h3>
                    <p>Het driverpaneel is een centraal onderdeel van de FleetConnect-taxivloot. Het stelt chauffeurs in staat om:</p>
                    <ul style="margin-left: 24px; margin-bottom: 12px;">
                        <li>Toegewezen ritten in te zien ("Mijn Ritten")</li>
                        <li>Details van een rit te bekijken en de status naar "voltooid" te wijzigen</li>
                        <li>Historische ritten en inkomsten te raadplegen ("Historiek")</li>
                        <li>Een financieel overzicht met grafieken te bekijken ("Financieel")</li>
                        <li>Persoonlijke gegevens in te zien ("Mijn Profiel")</li>
                    </ul>
                </div>

                <div class="report-section">
                    <h3>2. Dataverkeer & koppeling met Supabase</h3>
                    <p>Alle ritten worden opgeslagen in de tabel <span class="code-inline">bookings</span>. De belangrijkste kolommen voor de driver zijn:</p>
                    <table class="report-table">
                        <tr><th>Kolom</th><th>Beschrijving</th></tr>
                        <tr><td>id</span></span><td>Uniek ritnummer (bv. T-PV-20260601-001)</span></span></tr>
                        <tr><td>assigned_driver_id</span></span><td>ID van de chauffeur die de rit toegewezen heeft gekregen</span></span></tr>
                        <tr><td>status</span></span><td>pending â†’ accepted â†’ assigned â†’ completed / cancelled</span></span></tr>
                        <tr><td>amount</span></span><td>Ritbedrag in euro's (exclusief commissie)</span></span></tr>
                        <tr><td>datetime, time</span></span><td>Datum en tijd van de rit</span></span></tr>
                    </table>
                    <div class="highlight-box">
                        <i class="fas fa-lightbulb"></i> <strong>Tip:</strong> Als een rit per ongeluk is voltooid, neem dan contact op met de dispatcher.
                    </div>
                </div>

                <hr style="margin: 24px 0;">
                <p style="text-align: center; font-size: 0.75rem; color: #64748b;">Â© 2026 FleetConnect â€“ Driver Paneel versie 2.0</p>
            </div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitleWiki') + ' <span class="demo-badge">DEMO MODE</span>';
        }
    };

    // ==================== TAALINSTELLINGEN ====================
    function updateStaticTexts() {
        document.getElementById('logoSubtext').innerText = t('logoSubtext');
        document.getElementById('navRides').innerText = t('navRides');
        document.getElementById('navMyRides').innerText = t('navMyRides');
        document.getElementById('navHistory').innerText = t('navHistory');
        document.getElementById('navFinanceTitle').innerText = t('navFinanceTitle');
        document.getElementById('navFinance').innerText = t('navFinance');
        document.getElementById('navProfileTitle').innerText = t('navProfileTitle');
        document.getElementById('navProfileText').innerText = t('navProfileText');
        document.getElementById('navWikiTitle').innerText = t('navWikiTitle');
        document.getElementById('navWiki').innerText = t('navWiki');
        document.getElementById('logoutText').innerText = t('logoutText');
        document.getElementById('refreshText').innerText = t('refreshText');
        document.getElementById('logoutTitle').innerText = t('logoutTitle');
        document.getElementById('logoutConfirmMsg').innerText = t('logoutConfirmMsg');
        document.getElementById('logoutCancelBtn').innerText = t('logoutCancel');
        document.getElementById('logoutConfirmBtn').innerText = t('logoutConfirm');
        app.refreshCurrentTab();
    }

    function setLanguage(lang) {
        currentLang = lang;
        updateStaticTexts();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        app.showToast(`Taal gewijzigd naar ${lang.toUpperCase()}`);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
    });

    // Start de app
    setLanguage('nl');
    app.switchTab('myrides');
    window.app = app;
</script>
</body>
</html>
