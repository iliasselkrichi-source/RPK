    // Helper functie om route in te korten
    function shortenRoute(pickup, destination) {
        const shortenAddress = (address) => {
            if (!address) return '';
            const parts = address.split(',').map(p => p.trim());
            if (parts.length <= 2) return address;
            let result = parts[0];
            if (parts.length >= 2 && parts[1].length < 50) result += ', ' + parts[1];
            else if (parts.length >= 3 && parts[2].length < 50) result += ', ' + parts[2];
            if (result.length > 55) result = result.substring(0, 52) + '...';
            return result;
        };
        return `${shortenAddress(pickup)} → ${shortenAddress(destination)}`;

        acceptBooking(bookingId) {
            const booking = allBookings.find(b => b.id === bookingId);
            if (booking && booking.status === 'pending') {
                booking.status = 'accepted';
                updateFilteredArrays();
                this.refreshCurrentTab();
                this.showToast(`${t('toastAccept')}: ${bookingId}`);
                this.closeModal();
            }
        },
        assignDriverToBooking(bookingId, driverId) {
            if (!driverId) { this.showToast('Selecteer een driver', true); return; }
            const booking = allBookings.find(b => b.id === bookingId);
            if (booking && (booking.status === 'accepted' || booking.status === 'assigned')) {
                booking.status = 'assigned';
                booking.assigned_driver_id = driverId;
                updateFilteredArrays();
                this.refreshCurrentTab();
                this.showToast(`${t('toastAssign')}: ${bookingId} -> ${drivers.find(d=>d.id===driverId)?.name}`);
                this.showBookingFiche(booking);
            }
        },
        cancelRide(bookingId) {
            const booking = allBookings.find(b => b.id === bookingId);
            if (booking && (booking.status === 'accepted' || booking.status === 'assigned')) {
                booking.status = 'cancelled';
                updateFilteredArrays();
                this.refreshCurrentTab();
                this.showToast(`${t('toastCancel')}: ${bookingId}`);
                this.closeModal();
            }
        },

                    <div class="fiche-row"><span class="fiche-label">Bestemming:</span><span class="fiche-value">${booking.destination}</span></div>
                    <div class="fiche-row"><span class="fiche-label">Voertuig:</span><span class="fiche-value">${booking.vehicle}</span></div>
                    ${booking.flight_number ? `<div class="fiche-row"><span class="fiche-label">✈️ Vluchtnummer:</span><span class="fiche-value">${booking.flight_number}</span></div>` : ''}
                </div>
                <div class="fiche-section">
                    <h4>➕ ${t('extraInfo')}</h4>
                    <div class="fiche-row"><span class="fiche-label">Extra opties:</span><span class="fiche-value">${booking.extras || 'Geen'}</span></div>

                bodyHtml += `
                    <div class="driver-assign-section">

                        <select id="driverSelectFiche">${driverOptions}</select>
                        <button class="fiche-btn" style="background:#f59e0b; color:white;" onclick="app.assignDriverToBooking('${booking.id}', document.getElementById('driverSelectFiche').value)">${t('btnAssign')}</button>

            bodyHtml += `

                    <div class="amount">€ ${booking.amount.toFixed(2)}</div>
                    <div>Betaling: ${booking.payment}</div>
                </div>
            `;
            let actionsHtml = '';
            if (booking.status === 'pending') {
                actionsHtml = `<button class="fiche-btn confirm" onclick="app.acceptBooking('${booking.id}')">${t('btnAccept')}</button>`;
            } else if (booking.status === 'accepted' || booking.status === 'assigned') {
                actionsHtml = `<button class="fiche-btn danger" onclick="app.cancelRide('${booking.id}')">${t('btnCancel')}</button>`;

            actionsHtml += `<button class="fiche-btn close" onclick="app.closeModal()">${t('btnClose')}</button>`;

            document.getElementById('ficheBody').innerHTML = bodyHtml;

        switchTab(tabName) {
            this.currentTab = tabName;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.getAttribute('data-tab') === tabName) item.classList.add('active');
                else item.classList.remove('active');
            });
            this.refreshCurrentTab();
        },
        refreshCurrentTab() {
            switch(this.currentTab) {
                case 'neworders': this.renderNewOrders(); break;
                case 'orders': this.renderOrders(); break;
                case 'history': this.renderHistory(); break;
                case 'agenda': this.renderAgenda(); break;
                case 'drivers': this.renderDrivers(); break;
                case 'partners': this.renderPartners(); break;
                case 'financieel': this.renderFinance(); break;
                case 'settlements': this.renderSettlements(); break;
                case 'wiki': this.renderWiki(); break;
                default: this.renderNewOrders();
            }
        },
        
        renderNewOrders() { this.genericTableRender('neworders', this.newOrders, true); document.getElementById('pageTitle').innerHTML = t('pageTitleNew') + ' <span class="demo-badge">DEMO MODE</span>'; },
        renderOrders() { this.genericTableRender('orders', this.ordersList, true); document.getElementById('pageTitle').innerHTML = t('pageTitleOrders') + ' <span class="demo-badge">DEMO MODE</span>'; },
        renderHistory() { this.genericTableRender('history', this.historyOrders, false); document.getElementById('pageTitle').innerHTML = t('pageTitleHistory') + ' <span class="demo-badge">DEMO MODE</span>'; },
        
        genericTableRender(type, orders, showAction) {
            let html = `<div class="filter-bar"><div class="filter-group"><label>${t('filterOrderId')}</label><input type="text" id="filterOrder${type}" placeholder="${t('search')}"></div>
                        <div class="filter-group"><label>${t('filterName')}</label><input type="text" id="filterName${type}" placeholder="${t('search')}"></div>`;
            if (type !== 'neworders') html += `<div class="filter-group"><label>${t('filterDriver')}</label><select id="filterDriver${type}"><option value="">${t('filterDriver')}</option>${drivers.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}</select></div>`;
            html += `<div class="filter-actions"><button class="btn-filter" onclick="app.applyFilters('${type}')">${t('search')}</button>
                     <button class="btn-reset" onclick="app.resetFilters('${type}')">${t('reset')}</button></div></div>
                    <div class="orders-table-wrapper"><table class="orders-table"><thead>`;
            if (type === 'neworders') html += `<tr><th>${t('tableId')}</th><th>${t('tableDateTime')}</th><th>${t('tableCustomer')}</th><th>${t('tableRoute')}</th><th>${t('tableVehicle')}</th><th>${t('tableAmount')}</th><th>${t('tableAction')}</th></tr>`;
            else html += `<tr><th>${t('tableId')}</th><th>${t('tableDateTime')}</th><th>${t('tableCustomer')}</th><th>${t('tableRoute')}</th><th>${t('tableVehicle')}</th><th>${t('tableAmount')}</th><th>${t('tableDriver')}</th><th>${t('tableAction')}</th></tr>`;
            html += `</thead><tbody id="${type}TableBody"></tbody>}</div>`;
            document.getElementById('contentArea').innerHTML = html;
            this.renderTableBody(type, orders, showAction);
        },
        
        renderTableBody(type, orders, showAction) {
            const tbody = document.getElementById(`${type}TableBody`);
            if (!tbody) return;
            if (orders.length === 0) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:40px;">${t('noData')}</td></tr>`; return; }
            tbody.innerHTML = orders.map(r => {
                const driverName = drivers.find(d => d.id === r.assigned_driver_id)?.name || '—';
                let statusText = r.status === 'pending' ? 'Nieuw' : (r.status === 'accepted' ? 'Geaccepteerd' : (r.status === 'assigned' ? 'Toegewezen' : (r.status === 'completed' ? 'Voltooid' : 'Geannuleerd')));
                const shortRoute = shortenRoute(r.pickup, r.destination);
                const fullRoute = getFullRoute(r.pickup, r.destination);
                let row = `<tr>
                    <td style="white-space: nowrap;"><strong>${r.id}</strong><br><span class="status-badge status-${r.status}">${statusText}</span></td>
                    <td style="white-space: nowrap;">${r.datetime} ${r.time}</td>
                    <td style="white-space: nowrap;">${r.name}</td>
                    <td class="route-cell" title="${fullRoute.replace(/"/g, '&quot;')}" style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: help;">${shortRoute}</span></td>
                    <td style="white-space: nowrap;">${r.vehicle}</td>
                    <td style="white-space: nowrap;">€${r.amount.toFixed(2)}</span></td>`;
                if (type !== 'neworders') row += `<td style="white-space: nowrap;">${driverName}</td>`;
                if (showAction) row += `<td style="white-space: nowrap;"><button class="action-btn" onclick='app.showBookingFiche(${JSON.stringify(r).replace(/'/g, "&#39;")})'>${t('actionView')}</button></td>`;
                row += `</tr>`;
                return row;
            }).join('');
        },
        
        applyFilters(type) {
            let orderFilter = document.getElementById(`filterOrder${type}`)?.value.toLowerCase() || '';
            let nameFilter = document.getElementById(`filterName${type}`)?.value.toLowerCase() || '';
            let driverFilter = document.getElementById(`filterDriver${type}`)?.value || '';
            let rides = type === 'neworders' ? this.newOrders : (type === 'orders' ? this.ordersList : this.historyOrders);
            let filtered = rides.filter(r => (!orderFilter || r.id.toLowerCase().includes(orderFilter)) && (!nameFilter || r.name.toLowerCase().includes(nameFilter)) && (!driverFilter || r.assigned_driver_id === driverFilter));
            this.renderTableBody(type, filtered, type !== 'history');
        },
        resetFilters(type) {
            document.getElementById(`filterOrder${type}`).value = '';
            document.getElementById(`filterName${type}`).value = '';
            if (document.getElementById(`filterDriver${type}`)) document.getElementById(`filterDriver${type}`).value = '';
            this.renderTableBody(type, type === 'neworders' ? this.newOrders : (type === 'orders' ? this.ordersList : this.historyOrders), type !== 'history');
        },
        
        renderAgenda() {
            const stats = this.getTodayStats();
            let html = `
                <div class="dashboard-grid">
                    <div class="info-card"><div>${t('turnoverToday')}</div><div class="value">€${stats.total.toFixed(2)}</div><div class="sub">${t('commission')}: €${stats.commission.toFixed(2)}</div></div>
                    <div class="info-card"><div>${t('cashToday')}</div><div class="value">€${stats.cash.toFixed(2)}</div></div>
                    <div class="info-card"><div>${t('completedCancelled')}</div><div class="value">${stats.completed} / ${stats.cancelled}</div></div>
                    <div class="info-card"><div>${t('futureRides')}</div><div class="value">${stats.futureRides}</div></div>
                </div>
                <div class="calendar-container"><div class="calendar-header"><h2>${this.currentMonth.toLocaleDateString(currentLang === 'nl' ? 'nl-NL' : (currentLang === 'fr' ? 'fr-FR' : (currentLang === 'de' ? 'de-DE' : 'en-US')), {month:'long', year:'numeric'})}</h2><div class="calendar-nav"><button onclick="app.changeMonth(-1)"><i class="fas fa-chevron-left"></i> ${t('prevMonth')}</button><button onclick="app.goToToday()">${t('today')}</button><button onclick="app.changeMonth(1)">${t('nextMonth')} <i class="fas fa-chevron-right"></i></button></div></div><div class="calendar-weekdays"><div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div></div><div class="calendar-days" id="calendarDays"></div></div>
                <div class="planning-container"><h3>${t('pageTitleAgenda')}</h3><div class="planning-list" id="planningList">${t('noRidesPlanning')}</div></div>
            `;
            document.getElementById('contentArea').innerHTML = html;
            this.renderCalendar();
            document.getElementById('pageTitle').innerHTML = t('pageTitleAgenda') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        getTodayStats() {
            const todayStr = new Date().toISOString().slice(0,10).split('-').reverse().join('-');
            const todayRides = allBookings.filter(b => b.datetime === todayStr);
            const total = todayRides.reduce((s,r)=> s+r.amount,0);
            const cash = todayRides.filter(r=> r.payment==='Cash').reduce((s,r)=> s+r.amount,0);
            const completed = todayRides.filter(r=> r.status==='completed').length;
            const cancelled = todayRides.filter(r=> r.status==='cancelled').length;
            const futureRides = todayRides.filter(r=> r.status==='accepted' || r.status==='assigned').length;
            return { total, cash, commission: total*0.1, completed, cancelled, futureRides };
        },
        renderCalendar() {
            let container = document.getElementById('calendarDays');
            if (!container) return;
            let year = this.currentMonth.getFullYear(), month = this.currentMonth.getMonth();
            let firstDay = new Date(year, month, 1);
            let startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            let daysInMonth = new Date(year, month+1, 0).getDate();
            let prevDays = new Date(year, month, 0).getDate();
            let html = '';
            for (let i=startDay-1; i>=0; i--) {
                let prevDate = new Date(year, month, -i);
                let prevDateStr = `${prevDate.getDate().toString().padStart(2,'0')}-${(prevDate.getMonth()+1).toString().padStart(2,'0')}-${prevDate.getFullYear()}`;
                let hasRidesPrev = allBookings.some(b => b.datetime === prevDateStr);
                html += `<div class="calendar-day other-month ${hasRidesPrev ? 'has-rides' : ''}" onclick="app.selectDate(${prevDays-i}, ${month-1}, ${year})">${prevDays-i}${hasRidesPrev ? '<div class="ride-dot"></div>' : ''}</div>`;
            }
            for (let d=1; d<=daysInMonth; d++) {
                let dateStr = `${d.toString().padStart(2,'0')}-${(month+1).toString().padStart(2,'0')}-${year}`;
                let rides = allBookings.filter(b => b.datetime === dateStr);
                let hasRides = rides.length > 0;
                let isToday = (d===new Date().getDate() && month===new Date().getMonth() && year===new Date().getFullYear());
                let isSelected = (this.selectedDate && d===this.selectedDate.getDate() && month===this.selectedDate.getMonth() && year===this.selectedDate.getFullYear());
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasRides) classes += ' has-rides';
                html += `<div class="${classes}" onclick="app.selectDate(${d}, ${month+1}, ${year})">${d}${hasRides ? '<div class="ride-dot"></div>' : ''}</div>`;
            }
            let remaining = 42 - (startDay + daysInMonth);
            for (let d=1; d<=remaining; d++) {
                let nextDate = new Date(year, month+1, d);
                let nextDateStr = `${nextDate.getDate().toString().padStart(2,'0')}-${(nextDate.getMonth()+1).toString().padStart(2,'0')}-${nextDate.getFullYear()}`;
                let hasRidesNext = allBookings.some(b => b.datetime === nextDateStr);
                html += `<div class="calendar-day other-month ${hasRidesNext ? 'has-rides' : ''}" onclick="app.selectDate(${d}, ${month+2}, ${year})">${d}${hasRidesNext ? '<div class="ride-dot"></div>' : ''}</div>`;
            }
            container.innerHTML = html;
            this.renderPlanning();
        },
        renderPlanning() {
            let container = document.getElementById('planningList');
            if (!container) return;
            let dateStr = `${this.selectedDate.getDate().toString().padStart(2,'0')}-${(this.selectedDate.getMonth()+1).toString().padStart(2,'0')}-${this.selectedDate.getFullYear()}`;
            let rides = allBookings.filter(b => b.datetime === dateStr).sort((a,b)=>a.time.localeCompare(b.time));
            if (rides.length === 0) { container.innerHTML = `<div class="empty-planning">${t('noRidesPlanning')}</div>`; return; }
            container.innerHTML = rides.map(r => {
                const shortPickup = shortenRoute(r.pickup, r.destination).split('→')[0];
                const shortDest = shortenRoute(r.pickup, r.destination).split('→')[1];
                return `<div class="planning-item"><div class="planning-time"><i class="fas fa-clock"></i> ${r.time} uur</div><div class="planning-ride"><strong>${r.name}</strong> - ${shortPickup} → ${shortDest}</div><div class="planning-ride"><i class="fas fa-car"></i> ${r.vehicle}</div></div>`;
            }).join('');
        },
        selectDate(day, month, year) { this.selectedDate = new Date(year, month-1, day); this.currentMonth = new Date(year, month-1, 1); this.renderCalendar(); },
        changeMonth(delta) { this.currentMonth.setMonth(this.currentMonth.getMonth()+delta); this.renderAgenda(); },
        goToToday() { this.currentMonth = new Date(); this.selectedDate = new Date(); this.renderAgenda(); },
        
        renderDrivers() {
            let html = `<div class="people-card"><h3>${t('driversTitle')}</h3><button class="add-btn" onclick="app.showAddDriverForm()">${t('addDriver')}</button><div>`;
            if (drivers.length === 0) html += `<div>${t('noDrivers')}</div>`;
            else drivers.forEach(d => {
                html += `<div style="border:1px solid #e2e8f0; border-radius:12px; padding:12px; margin-bottom:12px; display:flex; justify-content:space-between;">
                            <div><strong>${d.driver_code}</strong> – ${d.name}<br><small>🚗 ${d.vehicle} | ${d.license_plate}</small></div>
                            <button class="delete-btn" onclick="app.deleteDriver('${d.id}')">${t('btnCancel')}</button>
                        </div>`;
            });
            html += `</div></div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitleDrivers') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        showAddDriverForm() {
            let name = prompt(t('addDriver') + ' - Naam:');
            if (!name) return;
            let email = prompt('E-mail:');
            if (!email) return;
            let vehicle = prompt('Voertuig:') || 'Standaard';
            let plate = prompt('Nummerplaat:') || 'Onbekend';
            const newId = generateDriverId();
            drivers.push({ id: newId, driver_code: newId, name, email, vehicle, license_plate: plate, partner_id: 1, color: 'Zwart' });
            this.showToast(`Driver ${name} toegevoegd met ID ${newId}`);
            this.renderDrivers();
        },
        deleteDriver(id) { if(confirm('Driver verwijderen?')) { drivers = drivers.filter(d => d.id !== id); this.renderDrivers(); this.showToast('Driver verwijderd'); } },
        
        renderPartners() {
            let html = `<div class="people-card"><h3>${t('partnersTitle')}</h3><button class="add-btn" onclick="app.showAddPartnerForm()">${t('addPartner')}</button><div>`;
            if (partners.length === 0) html += `<div>${t('noPartners')}</div>`;
            else partners.forEach(p => {
                html += `<div style="border:1px solid #e2e8f0; border-radius:16px; padding:16px; margin-bottom:16px;">
                            <div><strong>${p.name}</strong> ${p.is_hoofd ? '(Hoofdpartner)' : ''}</div>
                            <div><small>Contact: ${p.contact} | ${p.email}</small></div>
                            <button class="delete-btn" onclick="app.deletePartner(${p.id})">${t('btnCancel')}</button>
                         </div>`;
            });
            html += `</div></div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitlePartners') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        showAddPartnerForm() { this.showToast('Demo: partner toevoegen'); },
        deletePartner(id) { this.showToast('Demo: partner verwijderen'); },
        
        renderFinance() {
            let completedRides = allBookings.filter(b => b.status === 'completed');
            let totalRevenue = completedRides.reduce((s,r)=>s+r.amount,0);
            let cashRevenue = completedRides.filter(r=> r.payment === 'Cash').reduce((s,r)=>s+r.amount,0);
            let factuurRevenue = completedRides.filter(r=> r.payment === 'Factuur').reduce((s,r)=>s+r.amount,0);
            let commission = totalRevenue * 0.1;
            let html = `<div class="finance-kpi-grid"><div class="finance-kpi-card"><div class="value">€${totalRevenue.toFixed(2)}</div><div class="label">${t('turnover')}</div></div>
                        <div class="finance-kpi-card"><div class="value">€${cashRevenue.toFixed(2)}</div><div class="label">${t('cash')}</div></div>
                        <div class="finance-kpi-card"><div class="value">€${factuurRevenue.toFixed(2)}</div><div class="label">${t('invoice')}</div></div>
                        <div class="finance-kpi-card"><div class="value">${completedRides.length}</div><div class="label">${t('rides')}</div></div>
                        <div class="finance-kpi-card"><div class="value">€${commission.toFixed(2)}</div><div class="label">${t('commissionLabel')}</div></div></div>
                        <div class="finance-stats-grid"><div class="finance-stat-card"><h4>${t('newOrdersStat')}</h4><div class="value">${this.newOrders.length}</div></div>
                        <div class="finance-stat-card"><h4>${t('activeOrdersStat')}</h4><div class="value">${this.ordersList.length}</div></div>
                        <div class="finance-stat-card"><h4>${t('historyStat')}</h4><div class="value">${this.historyOrders.length}</div></div></div>
                        <div class="chart-container"><canvas id="revenueChart" width="400" height="200"></canvas></div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitleFinance') + ' <span class="demo-badge">DEMO MODE</span>';
            const ctx = document.getElementById('revenueChart')?.getContext('2d');
            if (ctx) {
                if (this.revenueChart) this.revenueChart.destroy();
                this.revenueChart = new Chart(ctx, { type: 'bar', data: { labels: ['Mei 2026', 'Jun 2026'], datasets: [{ label: t('chartLabel'), data: [176, 144.5], backgroundColor: '#2dd4bf' }] } });
            }
        },
        renderSettlements() {
            let gross = 320.50, net = 288.45;
            let html = `<div class="settlements-grid"><div class="settlement-card"><i class="fas fa-chart-line"></i><h4>${t('gross')}</h4><div class="value">€${gross.toFixed(2)}</div></div>
                        <div class="settlement-card"><i class="fas fa-undo-alt"></i><h4>${t('refunded')}</h4><div class="value">€0,00</div></div>
                        <div class="settlement-card"><i class="fab fa-stripe"></i><h4>${t('stripeFees')}</h4><div class="value">€${(gross-net).toFixed(2)}</div></div>
                        <div class="settlement-card"><i class="fas fa-coins"></i><h4>${t('net')}</h4><div class="value">€${net.toFixed(2)}</div></div></div>
                        <div class="orders-table-wrapper"><h3>${t('recentPayments')}</h3><table class="orders-table"><thead><tr><th>Booking</th><th>${t('tableDateTime')}</th><th>${t('tableAmount')}</th></tr></thead><tbody><tr><td>T-PV-20260530-045</span></span><td>30-05-2026</span></span><td>€64,00</span></span></tr>\n                        <tr><td>T-PV-20260529-032</td><td>29-05-2026</td><td>€112,00</td></tr>\n                    </tbody>\n                </div>`;
            document.getElementById('contentArea').innerHTML = html;
            document.getElementById('pageTitle').innerHTML = t('pageTitleSettlements') + ' <span class="demo-badge">DEMO MODE</span>';
        },
        
        renderWiki() {
            document.getElementById('contentArea').innerHTML = `
            <div class="wiki-container" style="background:white; border-radius:24px; padding:24px;">
                <h2><i class="fas fa-robot"></i> ${t('wikiTitle')}</h2>
                <p>${t('wikiText')}</p>
                <h3>📋 ${t('navNewOrders')}</h3><p>${t('btnAccept')}</p>
                <h3>📦 ${t('navOrders')}</h3><p>${t('btnAssign')}, ${t('btnCancel')}</p>
                <h3>📅 ${t('navAgenda')}</h3><p>${t('noRidesPlanning')}</p>
                <h3>👥 ${t('navDrivers')}</h3><p>${t('addDriver')}</p>
                <h3>💰 ${t('navFinancial')}</h3><p>${t('chartLabel')}</p>
                <hr><p style="text-align:center;">© 2026 FleetConnect — Partnerportaal</p>
            </div>`;
            document.getElementById('pageTitle').innerHTML = t('pageTitleWiki') + ' <span class="demo-badge">DEMO MODE</span>';
        }
    };

    function updateStaticTexts() {
        document.getElementById('logoSubtext').innerText = t('logoSubtext');
        document.getElementById('navBookings').innerText = t('navBookings');
        document.getElementById('navNewOrders').innerText = t('navNewOrders');
        document.getElementById('navOrders').innerText = t('navOrders');
        document.getElementById('navHistory').innerText = t('navHistory');
        document.getElementById('navAgenda').innerText = t('navAgenda');
        document.getElementById('navManagement').innerText = t('navManagement');
        document.getElementById('navDrivers').innerText = t('navDrivers');
        document.getElementById('navPartners').innerText = t('navPartners');
        document.getElementById('navFinance').innerText = t('navFinance');
        document.getElementById('navFinancial').innerText = t('navFinancial');
        document.getElementById('navSettlements').innerText = t('navSettlements');
        document.getElementById('navInfo').innerText = t('navInfo');
        document.getElementById('navWiki').innerText = t('navWiki');
        document.getElementById('logoutText').innerText = t('logoutText');
        document.getElementById('refreshText').innerText = t('refreshText');
        document.getElementById('userRole').innerText = t('userRole');
        document.getElementById('ficheTitle').innerText = t('ficheTitle');
        app.refreshCurrentTab();
    }
    function setLanguage(lang) {
        currentLang = lang;
        updateStaticTexts();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        app.showToast(`Taal gewijzigd naar ${lang.toUpperCase()}`);
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
    });

    updateFilteredArrays();
    setLanguage('nl');
    document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            const tab = item.getAttribute('data-tab');
            if (tab) app.switchTab(tab);
        });
    });
    app.switchTab('neworders');
    window.app = app;
</script>
